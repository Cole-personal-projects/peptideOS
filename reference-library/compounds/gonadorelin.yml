claims:
  - id: identity-native-gnrh
    text: Gonadorelin is the synthetic form of native gonadotropin-releasing hormone, a 10-amino-acid hypothalamic decapeptide.
    claim_type: identity
    evidence_level: approved_label
    route_scope: []
    source_ids:
      - pubchem-gonadorelin
      - conn-1991-gnrh-agonists-review
    confidence: high
    limitations: []
  - id: mechanism-gnrhr
    text: Gonadorelin binds the pituitary GnRH receptor and stimulates LH and FSH release.
    claim_type: mechanism
    evidence_level: approved_label
    route_scope:
      - subq
      - im
      - intranasal
    source_ids:
      - conn-1991-gnrh-agonists-review
      - berberoglu-gnrh-stimulation-test
    confidence: high
    limitations: []
  - id: mechanism-pulsatility-required
    text: Pulsatile GnRH exposure drives physiologic LH and FSH secretion; continuous exposure causes pituitary GnRH-receptor desensitization and downregulation.
    claim_type: mechanism
    evidence_level: human_strong
    route_scope:
      - subq
      - im
    source_ids:
      - conn-1991-gnrh-agonists-review
    confidence: high
    limitations:
      - Continuous vs pulsatile comparison is established in the literature but is a mechanism claim, not a personal-use protocol.
  - id: evidence-diagnostic-test
    text: Intravenous gonadorelin is used as a diagnostic test of pituitary LH and FSH reserve, with serial blood sampling after a single bolus.
    claim_type: evidence
    evidence_level: approved_label
    route_scope: []
    source_ids:
      - berberoglu-gnrh-stimulation-test
      - conn-1991-gnrh-agonists-review
      - triptorelin-vs-gonadorelin-2024
    confidence: high
    limitations:
      - Approved diagnostic use refers to labeled products; available products and labeled routes vary by jurisdiction and over time.
  - id: evidence-pulsatile-therapeutic
    text: Pulsatile gonadorelin delivered by programmable pump (IV or SC) has been used to restore LH, FSH, and sex-steroid secretion and to support ovulation or spermatogenesis in patients with hypothalamic hypogonadism.
    claim_type: evidence
    evidence_level: human_limited
    route_scope:
      - subq
    source_ids:
      - lu-pulsatile-ihh-2016
      - schopohl-pulsatile-ihh-male
    confidence: high
    limitations:
      - Evidence base is small clinical series and case reports; no large modern RCT establishes one universal pump protocol.
  - id: evidence-pk-sc-vs-iv
    text: Pharmacokinetic studies show that subcutaneous gonadorelin produces delayed and damped plasma GnRH profiles compared with IV bolus, with about one-third of SC dose lost to irreversible clearance during continuous infusion.
    claim_type: evidence
    evidence_level: human_limited
    route_scope:
      - subq
    source_ids:
      - handelsman-1984-pk
      - jansen-1987-sc-absorption
    confidence: high
    limitations:
      - Specific pharmacokinetic numbers reflect the cited 1984 and 1987 studies; modern bioequivalence of generic gonadorelin SC products is not separately verified in this record.
  - id: regulatory-status
    text: "Gonadorelin is an FDA-approved diagnostic agent for pituitary LH/FSH reserve testing (historical US brand: Factrel). The historical Factrel brand is no longer marketed; current US supply is typically through compounding pharmacies or non-US labeled products, and the regulatory status of any specific vial must be verified from the actual product label."
    claim_type: regulatory
    evidence_level: approved_label
    route_scope: []
    source_ids:
      - conn-1991-gnrh-agonists-review
      - pubchem-gonadorelin
    confidence: medium
    limitations:
      - Whether any specific user vial is FDA-approved, compounded, or imported must be confirmed from the actual product label; this record does not certify individual products.
  - id: risk-hypersensitivity
    text: Long-term gonadorelin pump therapy has been associated with IgE-mediated hypersensitivity, including local wheal-and-flare injection-site reactions.
    claim_type: risk
    evidence_level: human_limited
    route_scope:
      - subq
    source_ids:
      - hugues-1981-hypersensitivity
    confidence: medium
    limitations:
      - Based on a single case report; broader incidence is not quantified in this record.
  - id: risk-injection-generic
    text: Subcutaneous or intramuscular injection of gonadorelin carries the generic peptide-injection risks of injection-site reaction, local pain or induration, and sterility risk if reconstitution is poor.
    claim_type: risk
    evidence_level: theoretical
    route_scope:
      - subq
      - im
    source_ids: []
    confidence: low
    limitations:
      - Generic injection-route risk; not a gonadorelin-specific quantified risk in this record.
  - id: formulation-native-not-superagonist
    text: Native gonadorelin is not the same molecule as the long-acting GnRH superagonists (leuprolide, nafarelin, triptorelin, goserelin, histrelin, buserelin); the superagonists cause sustained receptor activation followed by desensitization, whereas native gonadorelin's effect is route- and schedule-dependent.
    claim_type: formulation
    evidence_level: approved_label
    route_scope: []
    source_ids:
      - conn-1991-gnrh-agonists-review
    confidence: high
    limitations: []
