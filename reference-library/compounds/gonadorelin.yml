positioning:
  why_use_this_compound:
    - Distinguish the native GnRH decapeptide from long-acting GnRH superagonists (leuprolide, triptorelin, goserelin, nafarelin, histrelin, buserelin) in inventory and stack logs.
    - Track pulsatile HPG-axis stimulation work, where native GnRH produces physiologic LH/FSH pulses, separately from sustained-agonist desensitization use.
    - Support label-candidate reference for the historical Factrel diagnostic test and for pulsatile-pump therapeutic protocols in hypothalamic hypogonadism.
  who_is_tracking_this:
    - Users with a legitimate prescription for gonadorelin diagnostic or pulsatile therapeutic protocols under clinical supervision.
    - Users comparing native GnRH to GnRH superagonists in reproductive-axis stack logs.
    - Researchers and clinicians tracking pulsatile pump therapy outcomes in IHH or hypothalamic amenorrhea.
  common_user_goals:
    - Separate identity, route, and reconstitution metadata from longer-acting GnRH analogs.
    - Connect inventory, schedule, and hormone-lab logs to the exact native-GnRH product used.
    - Review overlap with HCG, FSH, and kisspeptin-10 entries before saving a stack.

evidence:
  tier: approved_label
  mechanism_targets:
    - GnRH receptor (GnRHR) on anterior pituitary gonadotrophs
    - Downstream LH and FSH release
    - Hypothalamic-pituitary-gonadal axis
  claim_summary:
    - Gonadorelin is the synthetic form of native gonadotropin-releasing hormone (GnRH), a 10-amino-acid hypothalamic decapeptide that stimulates pituitary LH and FSH release.
    - Approved in the United States as a diagnostic agent (e.g. historical Factrel brand) for evaluating pituitary LH/FSH reserve; the standard test is an IV bolus with timed LH/FSH sampling.
    - Therapeutic pulsatile administration (IV or SC) restores gonadal function in patients with hypothalamic hypogonadism, including idiopathic hypogonadotropic hypogonadism and hypothalamic amenorrhea.
    - Pulsatile delivery is required for physiologic LH/FSH response; continuous exposure causes pituitary GnRHR desensitization and downregulation.
  evidence_gaps:
    - Pharmacokinetic damping after SC versus IV pulsatile delivery is documented and may require adjusted pump settings; this is a clinical-protocol concern, not guidance.
    - Historical Factrel brand was discontinued in the US; availability of approved-diagnostic gonadorelin has varied by jurisdiction and over time.
    - Long-term safety of chronic pulsatile native-GnRH therapy is supported by clinical series but lacks large, modern RCT data.

risks:
  by_route:
    subq:
      - Injection-site reactions, local irritation, and pain have been reported with SC administration.
      - Plasma GnRH profiles are damped with SC delivery compared with IV pulsatile administration; clinical pulsatile protocols using SC routes may require adjusted dosing intervals to maintain a physiologic pulse.
      - Hypersensitivity reactions including wheal-and-flare at injection sites have been documented with long-term Factrel pump therapy in at least one case report; discontinue and evaluate if hypersensitivity is suspected.
      - Sterility risk if reconstitution and aseptic technique are inadequate; compounded gonadorelin is not an FDA-approved end-product in most current US supply.
    im:
      - Injection-site pain, induration, or local tissue irritation at the IM injection site.
      - Same desensitization concern as other routes if exposure is continuous rather than pulsatile.
    intranasal:
      - Nasal irritation, congestion, and inconsistent mucosal absorption; no durable source in this record establishes intranasal gonadorelin as a labeled route, and this entry is included only because the schema allows it for category completeness.

tracking:
  useful_logs:
    - LH and FSH labs timed to dose or pulse
    - Sex-steroid labs (testosterone or estradiol) where the user already follows them
    - Injection-site condition
    - Reconstitution date and diluent volume
    - Pump settings, pulse interval, and dose for pulsatile protocols
  inventory_fields:
    - vial amount (mcg or mg)
    - reconstitution volume
    - concentration (mcg/mL or mg/mL)
    - lot number
    - expiration
    - storage temperature
    - source / pharmacy / manufacturer
  peppi_actions:
    - flag-prescription-required
    - prompt-source-verification
    - log-injection
    - log-lh-lab
    - log-fsh-lab

app_profile:
  headline: Native GnRH decapeptide; FDA-approved diagnostic agent and investigational pulsatile therapy.
  summary: "Gonadorelin is a synthetic GnRH analog used to stimulate pituitary LH and FSH release. Useful tracking captures pulse timing, route, concurrent hormone therapy, LH, FSH, testosterone labs, and symptom changes across the protocol."
  why_people_care:
    - Genuine FDA-approved diagnostic use to evaluate pituitary LH/FSH reserve.
    - Pulsatile therapeutic use for hypothalamic hypogonadism, supported by clinical case series and small trials.
    - Distinguishing native GnRH from superagonist analogs matters for stack and lab interpretation.
  what_to_verify:
    - Product is native gonadorelin (decapeptide), not a long-acting GnRH superagonist analog.
    - Prescription status, pharmacy, lot, and storage are recorded.
    - For pump use: pulse interval, dose per pulse, route (IV vs SC), and reconstitution date.
    - For diagnostic use: actual labeled product, dose, and sampling timepoints from the prescribing information.
  what_to_track:
    - LH, FSH, and relevant sex-steroid labs.
    - Injection-site condition.
    - For pulsatile protocols: pump settings, missed pulses, and any symptoms.
  reality_check: Gonadorelin is one of the few peptides in the the tracking record library with a real FDA-approved diagnostic label. The historical Factrel brand was discontinued, so current US supply is typically through compounding pharmacies or non-US labeled products, and the exact regulatory status of any specific vial must be verified from the actual product label. the tracking record structures user-confirmed data; it does not select protocols or interpret reproductive-axis labs.

