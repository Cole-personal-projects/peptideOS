pharmacokinetics:
  half_life_hours: 62
  half_life_source: "DailyMed sirolimus labeling describes terminal elimination half-life about 62 plus or minus 16 hours after multiple dosing in stable renal transplant patients."
  source_ids:
    - dailymed-sirolimus
  evidence_tier: approved_label
  model_notes: "First-order estimated remaining amount only; oral sirolimus exposure varies by product, food, interactions, and clinical context and does not represent measured concentration, clinical response, or dose guidance."

app_profile:
  headline: "Label-backed sirolimus tracking for high-caution longevity and immunology contexts."
  summary: "Sirolimus is an mTOR inhibitor with clinical immunosuppressant use and longevity-oriented interest. Useful tracking keeps schedule, formulation, trough or safety labs, lipids, glucose, mouth sores, infection signals, interactions, and tolerability together."
  why_people_care:
  - "It is widely discussed in longevity communities because of mTOR-pathway biology."
  - "It is also an approved prescription-drug class compound with significant safety context."
  what_to_verify:
  - "Exact product name, strength, dosage form, source, lot, and expiration."
  - "Whether the label says sirolimus, rapamycin, Rapamune, or a compounded product."
  what_to_track:
  - "Adherence and skipped entries."
  - "Tolerability notes and lab-context notes."
  - "Source and label flags for nonstandard products."
  reality_check: "Sirolimus is label-backed, but longevity interest should not be treated as care guidance."

