positioning:
  why_use_this_compound:
  - "Sirolimus is a label-backed mTOR inhibitor that often appears in longevity discussions."
  - "Exact product, strength, and source context matter because compounded or relabeled products may differ from labeled drugs."
  - "Users may want to keep longevity experiment notes separate from approved-label context."
  who_is_tracking_this:
  - "Users entering labeled sirolimus bottles or containers into inventory."
  - "Users comparing rapamycin and sirolimus naming."
  - "Users logging adherence and user-entered lab-context notes."
  common_user_goals:
  - "Verify the exact product and dosage form."
  - "mTOR inhibitor used clinically as an immunosuppressant and followed in longevity-oriented protocols with careful attention to schedule, trough levels when available, lipids, glucose, mouth ulcers, infection risk, and drug interactions. Records should keep dose timing and monitoring labs easy to compare."
  - "Track schedule and tolerability notes without mixing in clinical advice."

