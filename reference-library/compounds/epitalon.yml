    text: Epitalon is a synthetic tetrapeptide with sequence Ala-Glu-Asp-Gly (AEDG), derived from the bovine pineal extract epithalamin and developed by Vladimir Khavinson's laboratory.
    claim_type: identity
    evidence_level: human_limited
    route_scope: []
    source_ids:
      - pmc-overview-2025
      - wiki-epitalon
    confidence: high
    limitations: []
  - id: mechanism-telomerase
    text: In vitro studies in human somatic cells have reported that Epitalon induces hTERT expression and telomerase activity and can extend telomere length in those cell systems.
    claim_type: mechanism
    evidence_level: preclinical
    route_scope: []
    source_ids:
      - pmc-overview-2025
    confidence: medium
    limitations:
      - In vitro evidence; not demonstrated in human in vivo studies with hard endpoints.
  - id: evidence-human-thin
    text: Human clinical evidence is largely limited to older observational cohort studies using the parent epithalamin extract, not synthetic AEDG, with no large modern randomized controlled trials.
    claim_type: evidence
    evidence_level: human_limited
    route_scope: []
    source_ids:
      - pmc-overview-2025
    confidence: medium
    limitations:
      - Most human cohort data is from a single research program and uses the parent extract, not synthetic AEDG.
  - id: regulatory-not-approved
    text: Epitalon is not FDA-approved for any indication in humans.
    claim_type: regulatory
    evidence_level: unknown
    route_scope: []
    source_ids: []
    confidence: low
    limitations:
      - Absence-of-approval statement; users should confirm current regulatory status directly.
  - id: risk-research-chemical
    text: Epitalon is distributed in the West primarily as a research chemical, so product identity, purity, and contamination are not regulated.
    claim_type: risk
    evidence_level: unknown
    route_scope:
      - subq
      - intranasal
    source_ids: []
    confidence: low
    limitations:
      - General research-chemical market observation; not from a regulatory source specific to Epitalon.
