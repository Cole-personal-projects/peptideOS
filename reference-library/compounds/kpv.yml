forms:
  primary_route: oral
  supported_routes:
    - oral
    - topical
    - subq
  excluded_routes:
    - route: im
      reason: No human evidence; published preclinical work uses oral, IP, or topical routes.
    - route: intranasal
      reason: No durable human evidence for intranasal KPV systemic delivery.
