positioning:
  why_use_this_compound:
    - C-terminal tripeptide of alpha-MSH with anti-inflammatory activity but without melanocortin-receptor-driven pigmentation or appetite effects
    - Suppresses NF-kB and pro-inflammatory cytokines in preclinical models
    - PepT1-mediated uptake makes oral and intestinal exposure plausible
  who_is_tracking_this:
    - Users with gut-inflammation interest (IBD-adjacent)
    - Users with inflammatory skin condition interest
    - Researchers studying melanocortin-independent anti-inflammatory pathways
  common_user_goals:
    - Reduce inflammatory load (gut or skin)
    - Trial low-risk anti-inflammatory peptide
    - Topical adjunct for skin inflammation

evidence:
  tier: preclinical
  mechanism_targets:
    - Direct intracellular inhibition of IkB kinase / NF-kB pathway
    - MAP kinase inflammatory signaling
    - PepT1-mediated cellular uptake in intestinal epithelium and immune cells
    - Antimicrobial activity vs S. aureus and C. albicans (alpha-MSH/KPV)
  claim_summary:
    - KPV reduces incidence and severity of DSS- and TNBS-induced colitis in rodent models (Dalmasso 2008)
    - Anti-inflammatory effect appears melanocortin-receptor independent (Brzoska 2003)
    - Antimicrobial activity demonstrated in vitro (Cutuli 2000)
  evidence_gaps:
    - No published, well-powered human clinical trials for KPV
    - Optimal route, dose, and formulation in humans unknown
    - Long-term safety in humans uncharacterized

risks:
  by_route:
    oral:
      - Limited human safety data; theoretical GI tolerance issues
      - Purity/identity risk if sourced from research-chemical vendors
    topical:
      - Possible local irritation
      - Excipient sensitization risk depending on formulation
    subq:
      - Injection site reaction
      - Sterility risk from improper reconstitution
      - No human trial-grade safety data for injectable use

tracking:
  useful_logs:
    - Subjective gut symptom score (if used for GI inflammation)
    - Skin lesion photos / severity score (if topical)
    - Adverse event log
  inventory_fields:
    - vendor
    - lot
    - coa-on-file
    - purity-percent
    - form-factor
  peppi_actions:
    - log-ingestion
    - log-topical-application
    - log-injection
    - log-symptom-score

app_profile:
  headline: Tripeptide derived from alpha-MSH with melanocortin-independent anti-inflammatory activity.
  summary: KPV (Lys-Pro-Val) is the C-terminal tripeptide of alpha-MSH. Preclinical work shows it retains alpha-MSH's anti-inflammatory effect by directly inhibiting NF-kB and MAP kinase signaling, without engaging melanocortin receptors (so no pigmentation or appetite effects). It is taken up via the PepT1 transporter, making oral and intestinal exposure plausible.
  why_people_care:
    - Anti-inflammatory effect without alpha-MSH melanocortin side effects
    - Plausible oral and topical use, unlike many peptides
    - Strong preclinical signal in colitis models
  what_to_verify:
    - COA confirms KPV sequence and HPLC purity
    - Vendor lot traceability
    - Formulation matches stated route (oral capsule vs topical cream vs injectable vial)
  what_to_track:
    - Symptom score for whatever inflammation target you are using it for
    - Any adverse events
  reality_check: KPV is interesting in animals and in vitro. Human clinical-trial evidence is essentially absent. Treat any personal use as N=1 self-experimentation, not validated therapy.

