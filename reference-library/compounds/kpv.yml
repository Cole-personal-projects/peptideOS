    text: KPV is the C-terminal tripeptide (Lys-Pro-Val) of alpha-melanocyte-stimulating hormone.
    claim_type: identity
    evidence_level: human_strong
    route_scope: []
    source_ids:
      - brzoska-2003
    confidence: high
    limitations: []
  - id: mechanism-nfkb
    text: KPV exerts anti-inflammatory effects by suppressing NF-kB and MAP kinase signaling, independent of melanocortin receptors.
    claim_type: mechanism
    evidence_level: preclinical
    route_scope:
      - oral
      - topical
      - subq
    source_ids:
      - dalmasso-2008
      - brzoska-2003
    confidence: high
    limitations:
      - Mechanistic data from in vitro and rodent models; not confirmed in human trials
  - id: mechanism-pept1
    text: KPV is taken up into intestinal epithelial and immune cells via the PepT1 transporter, supporting oral and intestinal exposure.
    claim_type: mechanism
    evidence_level: preclinical
    route_scope:
      - oral
    source_ids:
      - dalmasso-2008
    confidence: high
    limitations: []
  - id: evidence-colitis
    text: Oral KPV reduced incidence and severity of DSS- and TNBS-induced colitis in mice.
    claim_type: evidence
    evidence_level: preclinical
    route_scope:
      - oral
    source_ids:
      - dalmasso-2008
      - kannengiesser-2008
    confidence: high
