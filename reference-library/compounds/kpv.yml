  - id: regulatory-status
    text: KPV is not an FDA-approved drug; use is investigational or compounded.
    claim_type: regulatory
    evidence_level: unknown
    route_scope: []
    source_ids: []
    confidence: low
    limitations:
      - No regulatory label exists for KPV; status statement reflects absence of approval rather than a positive regulatory record
