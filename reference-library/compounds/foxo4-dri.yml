app_profile:
  headline: Experimental senolytic peptide built to clear senescent cells - mouse data only.
  summary: "FOXO4-DRI is an experimental peptide studied around FOXO4-p53 signaling and cellular senescence. Useful tracking keeps research status, source, batch, preparation, route, timing, tolerability, and any objective markers clearly visible."
  why_people_care:
  - Targets a different senolytic pathway than fisetin, quercetin, or dasatinib + quercetin
  - Striking 2017 mouse results created lasting longevity-community interest
  - One of the few peptides explicitly designed as a senolytic
  what_to_verify:
  - Sequence or identity documentation from the source
  - Third-party COA for identity and purity
  - Vial amount, lot, and expiration
  what_to_track:
  - Reconstitution date and storage temperature
  - Subjective recovery, skin, hair, or energy changes through a cycle
  - Any biomarkers run before and after (CBC, inflammatory markers)
  reality_check: There is no human evidence. Every benefit claim traces back to mouse studies, and grey-market supply means you cannot assume the vial contains what the label says.
