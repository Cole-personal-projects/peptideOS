schema_version: 1
compound_id: ahk-cu
status: approved
updated_at: "2026-06-19"

identity:
  name: AHK-Cu
  aliases:
    - L-alanyl-L-histidyl-L-lysine-Cu2+
    - Alanine-histidine-lysine copper
    - ALA-HIS-LYS-CU
    - "CAS 682809-81-0"
  non_aliases:
    - GHK-Cu
    - Copper Tripeptide-1
    - glycyl-L-histidyl-L-lysine copper
  compound_type: peptide
  categories:
    - skin-hair

forms:
  primary_route: topical
  supported_routes:
    - topical
  excluded_routes:
    - route: subq
      reason: AHK-Cu evidence reviewed for this record is identity, ex vivo, and in vitro hair-follicle work; it does not establish subcutaneous product use.
    - route: im
      reason: AHK-Cu evidence reviewed for this record is identity, ex vivo, and in vitro hair-follicle work; it does not establish intramuscular product use.
    - route: oral
      reason: No reviewed source in this record establishes oral AHK-Cu product use.
    - route: intranasal
      reason: No reviewed source in this record establishes intranasal AHK-Cu product use.
  form_factors:
    - Finished topical scalp product
    - Finished topical skin product
    - Cosmetic raw ingredient requiring label and formulation review
  verification_fields:
    - exact compound name
    - CAS number or PubChem CID when present
    - concentration
    - carrier base
    - finished product versus raw ingredient
    - lot number
    - expiration date

positioning:
  why_use_this_compound:
    - Track AHK-Cu as its own copper-peptide identity instead of merging it with GHK-Cu.
    - Keep topical scalp or skin product data tied to the exact label, carrier, and site response.
    - Separate preclinical hair-follicle signal from unsupported protocol claims.
  who_is_tracking_this:
    - Users comparing topical copper-peptide products for scalp or skin appearance goals.
    - Users who want Peppi to catch AHK-Cu versus GHK-Cu label ambiguity before adding inventory.
    - Users documenting product-specific response notes, photos, and tolerability over time.
  common_user_goals:
    - Verify whether a label is AHK-Cu, GHK-Cu, or a generic copper peptide blend.
    - Track scalp or skin site response without treating the compound as automatically injectable.
    - Compare product batches, carrier bases, and irritation notes.

evidence:
  tier: preclinical
  mechanism_targets:
    - dermal papilla cell proliferation
    - human hair follicle ex vivo elongation
    - apoptosis-signaling markers in cultured dermal papilla cells
    - copper-peptide identity and labeling
  claim_summary:
    - PubChem catalogs AHK-Cu as a copper complex with CID 168431292 and CAS 682809-81-0.
    - The key peer-reviewed AHK-Cu paper found in this pass evaluated human hair follicles ex vivo and cultured dermal papilla cells in vitro.
    - The 2007 paper reported hair-follicle elongation and dermal papilla cell proliferation signals, with apoptosis-marker changes that are mechanistic rather than clinical outcome evidence.
  evidence_gaps:
    - No reviewed source in this pass establishes subcutaneous, intramuscular, oral, or intranasal AHK-Cu use.
    - Amass TrialCore searches for AHK-Cu and L-alanyl-L-histidyl-L-lysine did not surface a matching AHK-Cu clinical trial record; returned records were unrelated copper, CU-code, or alanyl-glutamine studies.
    - Human clinical outcomes for finished topical AHK-Cu products are not established by the cited 2007 ex vivo/in vitro study.
    - Product-specific tolerability and performance depend on the finished formulation, not just the AHK-Cu identity.

risks:
  by_route:
    topical:
      known_contraindications: []
      caution_populations: []
      negative_stack_flags: []
      formulation_risks:
        - Irritation potential depends on concentration, carrier base, excipients, and individual skin or scalp sensitivity.
        - Label confusion with GHK-Cu or generic copper peptide blends can corrupt inventory, schedule, and response tracking.
        - Raw cosmetic ingredients require formulation context before they can be treated like a finished topical product.
      unknowns:
        - Long-term outcomes for consumer topical AHK-Cu products are formulation-specific and not resolved by the reviewed sources.
        - Product-specific stability, storage, and carrier compatibility require label or supplier documentation.

tracking:
  useful_logs:
    - application site
    - scalp or skin photos
    - local irritation or tolerability notes
    - shedding or hair-density notes when relevant
    - carrier base and formulation changes
    - product batch changes
  inventory_fields:
    - exact label name
    - CAS number or PubChem CID when present
    - concentration
    - carrier base
    - finished product versus raw ingredient
    - lot number
    - expiration date
  peppi_actions:
    - Read a product photo and ask the user to confirm whether the label says AHK-Cu, GHK-Cu, or a generic copper peptide.
    - Add a labeled AHK-Cu topical product to inventory after user confirmation.
    - Flag unsupported route assumptions if the user tries to log AHK-Cu as injectable without source-backed product details.
    - Create reminders from user-confirmed label instructions without inventing frequency or protocol guidance.
    - Summarize site notes, photos, and batch changes for user review.

app_profile:
  headline: Topical-first copper peptide with preclinical hair-follicle signal.
  summary: >-
    AHK-Cu is a copper-complexed Ala-His-Lys peptide identity. For PeptideOS, it
    belongs as a topical-first skin-hair tracking compound: verify the label,
    capture formulation details, track scalp or skin response, and keep the
    evidence framed as ex vivo/in vitro rather than clinical proof.
  why_people_care:
    - It is commonly discussed by biohackers in the same copper-peptide lane as GHK-Cu, but the identity is different.
    - The strongest source-backed signal located here is hair-follicle and dermal-papilla cell research, which makes scalp tracking a natural app use case.
    - "It gives Peppi a useful guardrail: do not assume injectable workflows for every peptide-like product."
  what_to_verify:
    - Confirm the product says AHK-Cu or L-alanyl-L-histidyl-L-lysine-Cu2+, not GHK-Cu or Copper Tripeptide-1.
    - Confirm whether the item is a finished topical product or a raw cosmetic ingredient.
    - Capture concentration, carrier base, lot number, expiration date, and storage instructions from the label.
    - Verify any claimed human outcome data separately from the 2007 ex vivo/in vitro paper.
  what_to_track:
    - Application site, photos, local tolerability, shedding notes, visible scalp or skin changes, product batch, carrier base, and formulation changes.
  reality_check: >-
    AHK-Cu has a real cataloged identity and a peer-reviewed ex vivo/in vitro
    hair-follicle paper, but this record does not support injectable use or
    clinical outcome claims for finished topical products.

