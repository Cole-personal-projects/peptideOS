claims:
  - id: identity-ghsr-agonist
    text: Ibutamoren (MK-677) is a non-peptide agonist of the ghrelin receptor (GHSR-1a).
    claim_type: identity
    evidence_level: human_strong
    route_scope:
      - oral
    source_ids:
      - ghsr-structure
      - wikipedia-ibutamoren
    confidence: high
    limitations: []
  - id: mechanism-gh-igf1
    text: Oral MK-677 produces sustained elevation of pulsatile GH secretion and serum IGF-1.
    claim_type: mechanism
    evidence_level: human_strong
    route_scope:
      - oral
    source_ids:
      - nass-2008
      - murphy-1998
    confidence: high
    limitations: []
  - id: evidence-older-adults
    text: 25 mg oral MK-677 daily increased GH and IGF-1 in healthy older adults toward young-adult levels.
    claim_type: evidence
    evidence_level: human_limited
    route_scope:
      - oral
    source_ids:
      - nass-2008
    confidence: high
    limitations:
      - Single moderate-sized trial; long-term outcomes not assessed
  - id: risk-glucose
    text: MK-677 can worsen insulin sensitivity and elevate fasting glucose.
    claim_type: risk
    evidence_level: human_limited
    route_scope:
      - oral
    source_ids:
      - nass-2008
    confidence: high
    limitations: []
  - id: risk-edema
    text: Fluid retention and lower-extremity edema have been reported, with a CHF signal in frail/elderly subjects.
    claim_type: risk
    evidence_level: human_limited
    route_scope:
      - oral
    source_ids:
      - nass-2008
    confidence: medium
    limitations:
      - CHF signal came from a discontinued Alzheimer trial; magnitude in healthy users unclear
  - id: regulatory-status
    text: Ibutamoren is not FDA approved and is prohibited by WADA.
    claim_type: regulatory
    evidence_level: approved_label
    route_scope:
      - oral
    source_ids:
      - wikipedia-ibutamoren
    confidence: high
    limitations: []
