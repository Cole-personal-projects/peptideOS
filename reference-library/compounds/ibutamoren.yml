  - id: ghsr-structure
    title: "Structural basis of human ghrelin receptor signaling by ghrelin and the synthetic agonist ibutamoren"
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8568970/
    source_type: publication
    publisher: PMC
    year: 2021
