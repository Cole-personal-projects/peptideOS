schema_version: 1
compound_id: ibutamoren
status: approved
updated_at: "2026-06-19"

identity:
  name: Ibutamoren
  aliases:
    - MK-677
    - MK-0677
    - L-163,191
  non_aliases:
    - Ipamorelin
    - GHRP-6
  compound_type: small-molecule
  categories:
    - growth-hormone
    - longevity
    - metabolic

forms:
  primary_route: oral
  supported_routes:
    - oral
  excluded_routes:
    - route: subq
      reason: Orally bioavailable non-peptide; injectable use not part of human study record.
    - route: im
      reason: Orally bioavailable; no human evidence for IM administration.
    - route: intranasal
      reason: No human evidence for intranasal route.
    - route: topical
      reason: No human evidence for topical absorption.
  form_factors:
    - oral-capsule
    - oral-solution
  verification_fields:
    - vendor
    - lot
    - coa
    - mass-spec
    - hplc-purity

positioning:
  why_use_this_compound:
    - The only well-studied oral growth hormone secretagogue — no injections, no reconstitution
    - Sustained elevation of IGF-1 and GH pulse amplitude from once-daily dosing
    - Most clinically characterized non-peptide ghrelin mimetic, with multiple human trials on file
  who_is_tracking_this:
    - Longevity and biohacker users targeting the GH/IGF-1 axis
    - Lifters running it for appetite, sleep depth, and body composition shifts
    - Users tracking sleep architecture and recovery markers
  common_user_goals:
    - Bump IGF-1 toward youthful range
    - Deepen sleep (SWS and REM)
    - Add lean mass and appetite during a gaining phase

evidence:
  tier: human_limited
  mechanism_targets:
    - GHSR-1a (ghrelin receptor) agonism
    - Pituitary GH release (pulsatile)
    - Hepatic IGF-1 induction
  claim_summary:
    - 25 mg oral daily in older adults restored GH and IGF-1 toward young-adult levels (Nass 2008)
    - Reversed diet-induced nitrogen wasting in a short-term human study (Murphy 1998)
    - Increases slow-wave and REM sleep duration in several studies
  evidence_gaps:
    - No long-term safety data beyond ~2 years in any population
    - Effect on insulin sensitivity and fasting glucose is consistently negative but poorly quantified at lower doses
    - A frail elderly Alzheimer cohort showed an edema/CHF signal that halted the trial; how that generalizes to healthy users is unknown

risks:
  by_route:
    oral:
      - Increased appetite and weight gain
      - Fluid retention / peripheral edema
      - Increased fasting glucose, decreased insulin sensitivity
      - Lethargy or muscle pain reported in trials
      - Potential CHF exacerbation in frail elderly (signal from discontinued Alzheimer trial)
      - Elevated prolactin and cortisol modest but present
      - Banned by WADA for athletes

tracking:
  useful_logs:
    - Morning fasting IGF-1
    - Fasting glucose / HbA1c
    - Body weight, waist circumference
    - Sleep duration and subjective depth
    - Resting blood pressure
    - Ankle/lower-leg edema check
  inventory_fields:
    - vendor
    - lot
    - coa-on-file
    - purity-percent
    - expiration
  peppi_actions:
    - log-ingestion
    - log-igf1-lab
    - log-glucose-lab
    - log-sleep-quality
    - log-edema-check

app_profile:
  headline: Oral GH secretagogue that sustainedly raises IGF-1 — no needles.
  summary: "Ibutamoren is an oral ghrelin-receptor agonist that increases growth-hormone secretory signaling. Useful tracking ties dose timing to appetite, sleep, water retention, glucose, IGF-1, training recovery, and next-day feel."
  why_people_care:
    - The only oral option that meaningfully moves GH and IGF-1
    - Reliable IGF-1 bump without learning to inject
    - Most users notice deeper sleep within the first week
  what_to_verify:
    - COA confirming MK-677 identity (not a substituted GHRP)
    - HPLC purity above 98%
    - Vendor lot traceability and recent third-party testing
  what_to_track:
    - IGF-1 (baseline, then every 6-8 weeks)
    - Fasting glucose and HbA1c
    - Body weight, waist, and ankle edema
    - Subjective sleep quality
  reality_check: Human data is real but limited and aging. Glucose handling almost always gets worse, edema is common, and there is no clean long-term safety dataset. Not FDA approved.

