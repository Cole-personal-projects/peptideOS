schema_version: 1
compound_id: semax
status: approved
updated_at: "2026-06-19"

identity:
  name: Semax
  aliases:
    - Met-Glu-His-Phe-Pro-Gly-Pro
    - ACTH(4-7)-PGP
    - MEHFPGP
  non_aliases:
    - Selank
    - ACTH
  compound_type: peptide
  categories:
    - cognitive

forms:
  primary_route: intranasal
  supported_routes:
    - intranasal
    - subq
  excluded_routes:
    - route: oral
      reason: "Peptide is subject to gastrointestinal proteolysis; intranasal is the established clinical route."
    - route: im
      reason: "No standard intramuscular clinical protocol; intranasal and IV are the routes used in published research."
    - route: topical
      reason: "Not relevant to indication."
  form_factors:
    - nasal-spray
    - lyophilized-powder
  verification_fields:
    - sequence
    - purity
    - mass-spec-confirmation
    - concentration

positioning:
  why_use_this_compound:
    - "Russian-approved synthetic ACTH(4-10) analog used clinically for ischemic stroke recovery and cognitive disorders."
    - "Preclinical and limited human data describe nootropic and neuroprotective effects via BDNF and neurotrophin pathway activation."
  who_is_tracking_this:
    - users exploring nootropic neuropeptides
    - users interested in post-stroke cognitive recovery research
    - users tracking BDNF-modulating compounds
  common_user_goals:
    - cognitive clarity and focus
    - neuroprotection
    - post-stress recovery

evidence:
  tier: human_limited
  mechanism_targets:
    - BDNF and neurotrophin receptor transcriptional upregulation
    - melanocortin receptor system (devoid of hormonal ACTH activity)
    - reduction of ischemic neurological deficit in animal stroke models
  claim_summary:
    - "Synthetic heptapeptide Met-Glu-His-Phe-Pro-Gly-Pro: ACTH(4-7) fragment with C-terminal Pro-Gly-Pro stabilizer."
    - "Approved in Russia as a prescription medication since the 1990s for stroke recovery and cognitive disorders."
    - "Penetrates the brain after intranasal or IV administration; activates transcription of neurotrophins and their receptors after experimental cerebral ischemia."
  evidence_gaps:
    - Clinical evidence is predominantly Russian and not Western-replicated.
    - No large Western Phase III RCTs.
    - Long-term safety database is limited outside Russian clinical use.

risks:
  by_route:
    intranasal:
      - "Nasal mucosa irritation possible; not systematically characterized in Western literature."
      - "Published clinical safety data is limited to Russian clinical use."
    subq:
      - "No standardized clinical subcutaneous protocol in indexed Western literature; safety profile via this route is uncharacterized."

tracking:
  useful_logs:
    - subjective cognition / focus rating
    - mood
    - sleep
    - any nasal irritation
  inventory_fields:
    - vial-mg
    - concentration
    - reconstitution-volume
    - lot-number
    - supplier
  peppi_actions:
    - log-cognition-rating
    - log-administration
    - log-sleep

app_profile:
  headline: "A Russian-developed ACTH(4-10) analog used intranasally for stroke recovery and cognitive support, with preclinical evidence of BDNF upregulation."
  summary: "Semax is a synthetic heptapeptide derived from ACTH(4-7) with a stabilizing Pro-Gly-Pro tail. It is approved in Russia as a prescription medication for ischemic stroke and cognitive disorders. Preclinical and small clinical studies report nootropic and neuroprotective activity. Western RCT evidence is essentially absent."
  why_people_care:
    - reported nootropic and neuroprotective effects
    - BDNF and neurotrophin pathway activation
    - non-stimulant cognitive mechanism
  what_to_verify:
    - sequence and concentration from supplier
    - sterile nasal-spray formulation
  what_to_track:
    - subjective cognition, mood, sleep
    - nasal tolerability
  reality_check: "Clinical evidence is small-sample and primarily Russian. Not FDA-approved. Long-term human safety is not characterized in Western literature."

sources:
  - id: kaplan-1996
    title: "Synthetic ACTH analogue Semax displays nootropic-like activity in humans"
    url: "https://pubmed.ncbi.nlm.nih.gov/8923958/"
    source_type: publication
    publisher: PubMed / Neurosci Res Commun
    year: 1996
  - id: shadrina-pmc8226508
    title: "Brain Protein Expression Profile Confirms the Protective Effect of the ACTH(4-7)PGP Peptide (Semax) in a Rat Model of Cerebral Ischemia-Reperfusion"
    url: "https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8226508/"
    source_type: publication
    publisher: PMC / Int J Mol Sci
    year: 2021
  - id: medvedeva-pmc11498467
    title: "Semax and Pro-Gly-Pro Activate the Transcription of Neurotrophins and Their Receptor Genes after Cerebral Ischemia"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC11498467/"
    source_type: publication
    publisher: PMC
    year: 2024

claims:
  - id: identity-sequence
    text: "Semax is a synthetic heptapeptide Met-Glu-His-Phe-Pro-Gly-Pro, comprising the ACTH(4-7) fragment with a C-terminal Pro-Gly-Pro stabilizing tail."
    claim_type: identity
    evidence_level: identity
    source_ids:
      - shadrina-pmc8226508
      - kaplan-1996
    confidence: high
    limitations: []
    route_scope: []
  - id: mechanism-bdnf
    text: "Semax (and its PGP component) activates transcription of neurotrophins and their receptors in the cortex of rats following experimental cerebral ischemia."
    claim_type: mechanism
    evidence_level: preclinical
    source_ids:
      - medvedeva-pmc11498467
    confidence: high
    limitations: []
    route_scope: []
  - id: evidence-nootropic-human
    text: "Early human studies reported nootropic-like EEG and cognitive effects of Semax similar to those of typical nootropic drugs."
    claim_type: evidence
    evidence_level: human_limited
    route_scope:
      - intranasal
    source_ids:
      - kaplan-1996
    confidence: medium
    limitations:
      - Small-sample, older Russian-affiliated work; not Western-replicated in modern RCTs.
  - id: evidence-stroke-preclinical
    text: "In rat global-ischemia models, Semax reduced neurological deficit and infarct volume, and improved survival."
    claim_type: evidence
    evidence_level: preclinical
    route_scope:
      - intranasal
    source_ids:
      - shadrina-pmc8226508
      - medvedeva-pmc11498467
    confidence: high
    limitations: []
  - id: regulatory-russia
    text: "Semax has been approved in Russia as a prescription medication since the 1990s for stroke recovery and cognitive disorders; it is not FDA-approved."
    claim_type: regulatory
    evidence_level: human_limited
    source_ids:
      - kaplan-1996
    confidence: medium
    limitations:
      - Russian regulatory status referenced via clinical literature rather than direct regulatory citation.
    route_scope: []
  - id: risk-intranasal-uncharacterized
    text: "Long-term intranasal safety and tolerability are not systematically characterized in Western peer-reviewed literature."
    claim_type: risk
    evidence_level: unknown
    route_scope:
      - intranasal
    source_ids: []
    confidence: low
    limitations:
      - Based on absence of indexed Western long-term safety data.
