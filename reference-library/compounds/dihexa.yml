schema_version: 1
compound_id: dihexa
status: approved
updated_at: "2026-06-19"

identity:
  name: Dihexa
  aliases:
    - PNB-0408
    - N-hexanoic-Tyr-Ile-(6)-aminohexanoic amide
    - N-hexanoyl-Tyr-Ile-(6)-aminohexanoic amide
  non_aliases:
    - Angiotensin IV
  compound_type: small-molecule
  categories:
    - cognitive

forms:
  primary_route: oral
  supported_routes:
    - oral
    - topical
  excluded_routes:
    - route: subq
      reason: No published human or preclinical efficacy or safety data for subcutaneous administration in peer-reviewed sources.
    - route: im
      reason: No published human or preclinical efficacy or safety data for intramuscular administration in peer-reviewed sources.
    - route: intranasal
      reason: No published human pharmacokinetic or safety data for intranasal administration.
  form_factors:
    - oral capsule (research)
    - topical solution (research)
  verification_fields:
    - certificate_of_analysis_present
    - purity_percent
    - mass_spec_confirmation
    - third_party_assay

positioning:
  why_use_this_compound:
    - Orally bioavailable, brain-penetrant angiotensin IV analog reported to potentiate HGF/c-Met signaling in CNS models.
    - One of the more potent synaptogenic compounds in the preclinical nootropic literature on a per-mg basis.
  who_is_tracking_this:
    - Nootropic self-experimenters chasing synaptogenesis and long-term cognitive enhancement.
    - Researchers and biohackers following the Harding / WSU angiotensin IV analog program.
  common_user_goals:
    - Subjective cognition, memory, and verbal fluency gains.
    - Recovery support after concussion or cognitive decline (purely hypothesis-driven, no human data).

evidence:
  tier: preclinical
  mechanism_targets:
    - HGF/c-Met signaling potentiation (proposed)
    - Angiotensin IV-related pathways (parent class)
  claim_summary:
    - Dihexa is a synthetic angiotensin IV-derived oligopeptide developed at Washington State University as a brain-penetrant analog.
    - Preclinical rodent studies report procognitive effects in scopolamine-impaired and aged models.
    - No published human clinical trials, no established human safety profile, and no regulatory approval.
  evidence_gaps:
    - No human pharmacokinetic, efficacy, or safety data published in peer-reviewed sources.
    - Long-term safety, carcinogenicity, and reproductive toxicity unknown in humans.
    - A foundational biochemistry paper from the original lab was retracted, which complicates the mechanistic story.

risks:
  by_route:
    oral:
      - No human safety data; adverse event profile in humans is unknown.
      - Sold only as a research chemical; product identity, purity, and contamination are not regulated.
    topical:
      - No human safety data for topical delivery; absorption and systemic exposure not characterized.

tracking:
  useful_logs:
    - subjective cognition notes
    - sleep quality
    - mood
    - any adverse symptoms
  inventory_fields:
    - vendor
    - lot_number
    - certificate_of_analysis
    - purity_percent
    - storage_conditions
  peppi_actions:
    - flag_no_human_data
    - require_coa_before_logging

app_profile:
  headline: Brain-penetrant angiotensin IV analog with strong preclinical cognition data and zero human trials.
  summary: "Dihexa is an experimental angiotensin-derived cognitive research compound studied for synaptogenic signaling. Useful tracking keeps preparation, route, timing, focus, memory, mood, sleep, and tolerability notes clear because human evidence is limited."
  why_people_care:
    - Reported to be orders of magnitude more potent than BDNF in synaptogenesis assays.
    - Oral, brain-penetrant — rare combination for a peptide-adjacent nootropic.
    - HGF/c-Met as a fresh angle on long-term cognitive enhancement and CNS repair.
  what_to_verify:
    - COA with identity confirmation by mass spec.
    - Purity percent and absence of common research-chemical contaminants.
  what_to_track:
    - Subjective cognition (memory, word recall, verbal fluency).
    - Sleep, mood, headaches, and any adverse symptoms.
  reality_check: Every cognition claim comes from rodent studies in a single research program, and a foundational mechanism paper was retracted. Anyone taking this is doing unvalidated self-experimentation.

