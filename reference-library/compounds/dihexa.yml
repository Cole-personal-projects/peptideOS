positioning:
  why_use_this_compound:
    - Preclinical interest as a brain-penetrant angiotensin IV analog reported to potentiate the hepatocyte growth factor (HGF) / c-Met system in CNS models.
    - Tracked by users interested in research-grade nootropics and synaptogenesis hypotheses.
  who_is_tracking_this:
    - Self-experimenters interested in nootropic research compounds.
    - Researchers following HGF/c-Met and angiotensin IV analog literature.
  common_user_goals:
    - Learn what the published preclinical literature actually shows.
    - Understand the absence of human data before considering any use.

evidence:
  tier: preclinical
  mechanism_targets:
    - HGF/c-Met signaling potentiation (proposed)
    - Angiotensin IV-related pathways (parent class)
  claim_summary:
    - Dihexa is a synthetic angiotensin IV-derived oligopeptide developed at Washington State University as a brain-penetrant analog.
    - Preclinical rodent studies report procognitive effects in scopolamine-impaired and aged models.
    - No published human clinical trials, no established human safety profile, and no regulatory approval.
  evidence_gaps:
    - No human pharmacokinetic, efficacy, or safety data published in peer-reviewed sources.
    - Long-term safety, carcinogenicity, and reproductive toxicity unknown in humans.
    - Mechanistic claims around HGF/c-Met rest on a limited preclinical literature.

risks:
  by_route:
    oral:
      - No human safety data; adverse event profile in humans is unknown.
      - Sold only as a research chemical; product identity, purity, and contamination are not regulated.
    topical:
      - No human safety data for topical delivery; absorption and systemic exposure not characterized.

tracking:
  useful_logs:
    - subjective cognition notes
    - sleep quality
    - mood
    - any adverse symptoms
  inventory_fields:
    - vendor
    - lot_number
    - certificate_of_analysis
    - purity_percent
    - storage_conditions
  peppi_actions:
    - flag_no_human_data
    - require_coa_before_logging

app_profile:
  headline: Research-grade angiotensin IV analog with preclinical cognition signals and no human data.
  summary: Dihexa is a synthetic small molecule derived from angiotensin IV, designed to cross the blood-brain barrier and studied in rodent models for synaptogenesis and cognition via the HGF/c-Met system. There are no published human clinical trials and no established human safety profile.
  why_people_care:
    - Reported potency in preclinical synaptogenesis assays.
    - Interest in HGF/c-Met as a cognition target.
  what_to_verify:
    - Certificate of analysis and identity confirmation from the vendor.
    - Purity and absence of common research-chemical contaminants.
  what_to_track:
    - Subjective cognitive changes.
    - Sleep, mood, and any adverse symptoms.
  reality_check: Human safety and efficacy are not established. All cognition claims come from preclinical rodent studies, and one foundational biochemistry paper from the original lab was retracted. Treat any use as unvalidated self-experimentation.

