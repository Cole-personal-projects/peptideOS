claims:
  - id: oxytocin-fda-approved-obstetric
    text: Oxytocin (Pitocin) is FDA-approved for labor induction and postpartum hemorrhage control via IV/IM administration.
    claim_type: regulatory
    evidence_level: approved_label
    route_scope:
      - im
    source_ids:
      - statpearls-oxytocin
    confidence: high
    limitations: []
  - id: oxytocin-mechanism-oxtr
    text: Oxytocin acts via the oxytocin receptor (OXTR), expressed in uterus, mammary tissue, and the central nervous system.
    claim_type: mechanism
    evidence_level: human_strong
    route_scope:
      - im
      - intranasal
      - subq
    source_ids:
      - statpearls-oxytocin
    confidence: high
    limitations: []
  - id: oxytocin-intranasal-offlabel
    text: Intranasal oxytocin is not FDA-approved; behavioral/social effects in research are context- and dose-dependent with replication and CNS-penetration caveats.
    claim_type: evidence
    evidence_level: human_limited
    route_scope:
      - intranasal
    source_ids:
      - alzforum-intranasal-oxytocin
    confidence: medium
    limitations:
      - Mixed replication across social-cognition studies.
      - Uncertain CNS bioavailability via intranasal route.
