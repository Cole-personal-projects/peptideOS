    source_type: publication
    publisher: PubMed
    year: 1992
  - id: pubmed-7028502
    title: The influence of synthetic DSIP (delta-sleep-inducing-peptide) on disturbed human sleep
    url: https://pubmed.ncbi.nlm.nih.gov/7028502/
    source_type: publication
    publisher: PubMed
    year: 1981
  - id: pubmed-6895513
    title: Acute and delayed effects of DSIP (delta sleep-inducing peptide) on human sleep behavior
    url: https://pubmed.ncbi.nlm.nih.gov/6895513/
    source_type: publication
    publisher: PubMed
    year: 1982

claims:
  - id: identity-class
    text: DSIP is a naturally occurring neuropeptide identified in the 1970s in connection with delta-wave sleep research.
    claim_type: identity
    evidence_level: human_limited
    route_scope: []
    source_ids:
      - pubmed-7028502
    confidence: high
    limitations: []
  - id: evidence-insomnia-rct
    text: A small double-blind study in chronic insomnia patients reported higher sleep efficiency and shorter sleep latency with DSIP versus placebo.
    claim_type: evidence
    evidence_level: human_limited
    route_scope:
      - subq
    source_ids:
      - pubmed-1299794
    confidence: medium
    limitations:
      - Small sample size; older methodology; results have not been reproduced in larger modern trials.
  - id: evidence-acute-sleep
    text: Acute administration of synthetic DSIP in humans has been reported to influence sleep onset, sleep efficiency, and subjective sleep behavior in small studies.
    claim_type: evidence
    evidence_level: human_limited
    route_scope: []
    source_ids:
      - pubmed-6895513
      - pubmed-7028502
    confidence: medium
    limitations:
      - Studies are small and dated; results across the literature are mixed.
  - id: risk-no-longterm-safety
    text: There is no standardized long-term human safety data for DSIP.
    claim_type: risk
    evidence_level: unknown
    route_scope:
      - subq
      - intranasal
    source_ids: []
    confidence: low
    limitations:
      - Absence-of-evidence statement based on lack of indexed long-term safety trials.
