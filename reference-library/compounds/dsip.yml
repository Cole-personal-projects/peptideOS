schema_version: 1
compound_id: dsip
status: approved
updated_at: "2026-06-19"

identity:
  name: Delta Sleep-Inducing Peptide
  aliases:
    - DSIP
  non_aliases: []
  compound_type: peptide
  categories:
    - sleep

forms:
  primary_route: subq
  supported_routes:
    - subq
    - intranasal
  excluded_routes:
    - route: oral
      reason: Peptide is expected to be degraded by gastrointestinal proteases; no published human oral pharmacokinetic data.
    - route: topical
      reason: No published human pharmacokinetic or efficacy data for topical administration.
    - route: im
      reason: No durable published human efficacy or safety data specifically supporting intramuscular use.
  form_factors:
    - lyophilized powder for reconstitution
    - intranasal spray (research)
  verification_fields:
    - certificate_of_analysis_present
    - purity_percent
    - mass_spec_confirmation

positioning:
  why_use_this_compound:
    - Endogenous neuropeptide first isolated in the 1970s in the context of delta-wave sleep research.
    - Non-GABAergic angle for users who don't tolerate or don't want benzodiazepine-class or Z-drug sleep aids.
  who_is_tracking_this:
    - Self-experimenters with insomnia or fragmented sleep looking for non-sedating options.
    - Users interested in 1970s-1990s European and Soviet neuropeptide literature.
    - Stack builders pairing it with other recovery, stress, or longevity peptides.
  common_user_goals:
    - Falling asleep faster or staying asleep longer.
    - More restorative deep sleep without next-day grogginess.
    - Stress-axis modulation alongside sleep effects.

evidence:
  tier: human_limited
  mechanism_targets:
    - Sleep regulation (mechanism in humans not fully characterized)
    - Neuroendocrine and stress-axis modulation (proposed)
  claim_summary:
    - DSIP is a naturally occurring nonapeptide isolated by Schoenenberger and Monnier in the 1970s from rabbit cerebral venous blood during delta-wave sleep.
    - A small number of human studies in chronic insomnia reported improvements in sleep efficiency and latency vs. placebo with intravenous synthetic DSIP.
    - Results across human studies are mixed and most of the clinical literature is 30-50 years old.
  evidence_gaps:
    - No large, modern randomized controlled trials.
    - Mechanism of action in humans is still not well characterized.
    - Subcutaneous and intranasal routes used in self-experimentation have no published human pharmacokinetic data.

risks:
  by_route:
    subq:
      - Human safety data limited to small early-era studies; long-term safety unknown.
      - Product purity and identity vary in the research-chemical market.
    intranasal:
      - No published human pharmacokinetic or safety data specifically for intranasal DSIP.
      - Local nasal mucosal effects not characterized.

tracking:
  useful_logs:
    - sleep onset latency
    - total sleep time
    - subjective sleep quality
    - next-day alertness
    - any adverse symptoms
  inventory_fields:
    - vendor
    - lot_number
    - certificate_of_analysis
    - purity_percent
    - storage_conditions
  peppi_actions:
    - flag_thin_evidence
    - require_coa_before_logging

app_profile:
  headline: Old-school sleep neuropeptide with a thin, mostly-Soviet-era evidence base.
  summary: "DSIP is a sleep- and stress-axis research peptide with variable reports and mixed evidence. Useful tracking focuses on bedtime timing, sleep latency, awakenings, dream intensity, next-day alertness, and interactions with other sleep aids."
  why_people_care:
    - Non-GABAergic mechanism — different lane from benzos and Z-drugs.
    - Reputation for working on stress-driven insomnia and improving deep-sleep feel.
    - Cheap, well-characterized peptide on the research-chemical market.
  what_to_verify:
    - COA with identity confirmation by mass spec.
    - Purity percent and storage handling from the vendor.
  what_to_track:
    - Sleep latency, total sleep time, subjective sleep quality.
    - Next-day cognition, mood, and any adverse symptoms.
  reality_check: The human evidence base is small, old, and mostly intravenous. Subcutaneous and intranasal self-experimentation has no published PK data, and long-term safety is unknown.

sources:
