schema_version: 1
compound_id: dsip
status: approved
updated_at: "2026-06-19"

identity:
  name: Delta Sleep-Inducing Peptide
  aliases:
    - DSIP
  non_aliases: []
  compound_type: peptide
  categories:
    - sleep

forms:
  primary_route: subq
  supported_routes:
    - subq
    - intranasal
  excluded_routes:
    - route: oral
      reason: Peptide is expected to be degraded by gastrointestinal proteases; no published human oral pharmacokinetic data.
    - route: topical
      reason: No published human pharmacokinetic or efficacy data for topical administration.
    - route: im
      reason: No durable published human efficacy or safety data specifically supporting intramuscular use.
  form_factors:
    - lyophilized powder for reconstitution
    - intranasal spray (research)
  verification_fields:
    - certificate_of_analysis_present
    - purity_percent
    - mass_spec_confirmation

positioning:
  why_use_this_compound:
    - Historical research interest as a neuropeptide associated with delta-wave sleep.
    - Small early human studies reported modest sleep-quality changes in insomnia populations.
  who_is_tracking_this:
    - Self-experimenters interested in sleep peptides.
    - Researchers reviewing 1980s-1990s neuropeptide and sleep literature.
  common_user_goals:
    - Understand what early human DSIP studies actually showed.
    - Distinguish anecdotal claims from the limited clinical evidence.

evidence:
  tier: human_limited
  mechanism_targets:
    - Sleep regulation (mechanism in humans not fully characterized)
    - Neuroendocrine and stress-axis modulation (proposed)
  claim_summary:
    - DSIP is a naturally occurring neuropeptide first characterized in the 1970s in the context of delta-wave sleep research.
    - A small number of human studies in chronic insomnia reported improvements in sleep efficiency and latency vs. placebo with intravenous synthetic DSIP.
    - Results across human studies are mixed; modern, adequately powered trials are lacking.
  evidence_gaps:
    - No large, modern randomized controlled trials.
    - No standardized long-term human safety data.
    - Intranasal route is commonly used in self-experimentation but lacks published human pharmacokinetic studies.

risks:
  by_route:
    subq:
      - Human safety data limited to small early-era studies; long-term safety unknown.
      - Product purity and identity vary in the research-chemical market.
    intranasal:
      - No published human pharmacokinetic or safety data specifically for intranasal DSIP.
      - Local nasal mucosal effects not characterized.

tracking:
  useful_logs:
    - sleep onset latency
    - total sleep time
    - subjective sleep quality
    - next-day alertness
    - any adverse symptoms
  inventory_fields:
    - vendor
    - lot_number
    - certificate_of_analysis
    - purity_percent
    - storage_conditions
  peppi_actions:
    - flag_thin_evidence
    - require_coa_before_logging

app_profile:
  headline: Early-era sleep neuropeptide with small, mixed human studies and no modern trials.
  summary: DSIP is a neuropeptide studied in the 1970s-1990s for effects on sleep architecture. A handful of small human studies showed modest improvements in sleep efficiency and latency in insomnia patients with intravenous synthetic DSIP, but modern, well-powered evidence is essentially absent.
  why_people_care:
    - Interest in non-GABAergic sleep aids.
    - Curiosity about peptides influencing sleep architecture.
  what_to_verify:
    - Certificate of analysis and identity confirmation from the vendor.
    - Purity and storage handling.
  what_to_track:
    - Sleep latency, total sleep time, and subjective quality.
    - Next-day cognition and any adverse symptoms.
  reality_check: The human evidence base is small, old, and mostly intravenous. Self-experimentation via subcutaneous or intranasal routes is not supported by published pharmacokinetic data, and long-term safety is unknown.

sources:
