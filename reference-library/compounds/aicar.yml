schema_version: 1
compound_id: "aicar"
status: approved
updated_at: "2026-06-19"

identity:
  name: "AICAR"
  aliases:
    - "Acadesine"
    - "AICA riboside"
    - "5-Aminoimidazole-4-carboxamide ribonucleoside"
  non_aliases:
    - "Not an AMP analog itself — the intracellular metabolite ZMP is what mimics AMP and activates AMPK"
  compound_type: small-molecule
  categories:
    - metabolic
    - longevity

forms:
  primary_route: oral
  supported_routes: [oral]
  excluded_routes:
    - route: subq
      reason: "No approved formulation; injectable use is investigational only and outside approved channels"
    - route: im
      reason: "No approved formulation"
    - route: intranasal
      reason: "No published pharmacokinetic data supporting this route"
    - route: topical
      reason: "No published pharmacokinetic data supporting this route"
  form_factors: []
  verification_fields:
    - "CAS number (2627-69-2)"
    - "PubChem CID (17513)"
    - "Certificate of analysis confirming identity and purity"

positioning:
  why_use_this_compound:
    - "Activate AMPK, the master metabolic sensor that governs glucose uptake, fat oxidation, and mitochondrial biogenesis"
    - "Mimic some downstream effects of exercise and caloric restriction in preclinical models"
    - "Probe AMPK biology for longevity and metabolic research"
  who_is_tracking_this:
    - "Researchers studying AMPK and energy-sensing pathways"
    - "Biohackers experimenting with exercise mimetics"
    - "Endurance athletes outside competitive sport (it's WADA-banned)"
  common_user_goals:
    - "Boost mitochondrial function and endurance capacity"
    - "Improve insulin sensitivity and glucose handling"
    - "Explore caloric-restriction-like signaling without the restriction"

evidence:
  tier: preclinical
  mechanism_targets:
    - "AMP-activated protein kinase (AMPK), activated indirectly via the intracellular AICAR metabolite ZMP"
    - "Downstream effects on glucose uptake, fatty acid oxidation, and mitochondrial biogenesis pathways"
  claim_summary:
    - "Adenosine analog phosphorylated intracellularly to ZMP, which mimics AMP and activates AMPK"
    - "Famous 2008 Salk study showed sedentary mice on AICAR ran 44% longer than controls"
    - "Historical acadesine cardiac surgery trials did not lead to approval; no metabolic or performance indication exists"
    - "WADA-banned as a metabolic modulator since 2009"
  evidence_gaps:
    - "No human trials for metabolic, longevity, or performance endpoints"
    - "Oral bioavailability in humans is poor; most rodent work used injection"
    - "Many cellular effects originally attributed to AICAR are now known to be AMPK-independent, complicating mechanism claims"

risks:
  by_route:
    oral:
      - "No approved oral product; purity and bioavailability of grey-market material is not characterized"
      - "Banned by WADA; competitive athletes risk sanctions"
      - "Limited human safety data outside the historical acadesine cardiac surgery program"

tracking:
  useful_logs:
    - "Source / lot / certificate of analysis"
    - "Subjective energy, exercise tolerance, and recovery notes"
  inventory_fields:
    - "vendor"
    - "lot_number"
    - "coa_url"
  peppi_actions:
    - "Surface that AICAR has no approved human indication and is WADA-banned before any tracking suggestion"

app_profile:
  headline: "AMPK-activating exercise mimetic with strong rodent data and almost no human evidence."
  summary: "AICAR is an AMPK-pathway research compound often discussed around cellular energy, endurance signaling, and metabolic flexibility. Useful tracking keeps form, preparation, timing, training context, glucose markers, energy, and tolerability notes in one place."
  why_people_care:
    - "AMPK activation mimics signaling normally triggered by exercise and fasting"
    - "Rodent endurance gains in published studies are large and reproducible"
    - "Potential metabolic upside for glucose handling and fat oxidation"
  what_to_verify:
    - "Identity and purity via certificate of analysis (CAS 2627-69-2)"
    - "Legal status in your jurisdiction"
    - "WADA prohibited-list status if you compete"
  what_to_track:
    - "Source, lot, third-party testing"
    - "Endurance, recovery, perceived exertion if used experimentally"
    - "Fasting glucose and insulin sensitivity markers"
  reality_check: "Almost everything exciting about AICAR comes from mice. Human metabolic and performance data does not exist in any meaningful form, and competitive athletes who use it get banned."

