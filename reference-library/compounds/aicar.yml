    claim_type: identity
    evidence_level: identity
    route_scope: []
    source_ids:
      - "pubchem-aicar"
    confidence: high
    limitations: []
  - id: "mechanism-ampk"
    text: "AICAR is taken up by cells and phosphorylated to ZMP, an AMP mimetic that allosterically activates AMPK."
    claim_type: mechanism
    evidence_level: preclinical
    route_scope: []
    source_ids:
      - "nature-emm-ampk-activators"
    confidence: high
    limitations: []
  - id: "ampk-independent-effects"
    text: "Many cellular effects historically attributed to AICAR are AMPK-independent and may reflect ZMP action on other targets."
