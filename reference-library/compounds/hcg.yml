forms:
  primary_route: subq
  supported_routes:
  - subq
  - im
  excluded_routes:
  - route: oral
    reason: hCG is a 237-residue glycoprotein not absorbed orally; all approved products are injectable (subcutaneous or intramuscular).
  - route: intranasal
    reason: No approved intranasal hCG product; no durable human evidence for intranasal delivery.
  - route: topical
    reason: No approved topical hCG product and no evidence of transdermal systemic absorption.
  form_factors:
  - lyophilized-vial
  - prefilled-syringe
  - multi-dose-vial
