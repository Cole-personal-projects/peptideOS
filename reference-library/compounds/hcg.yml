  - route-on-label

positioning:
  why_use_this_compound:
  - FDA-approved indication for ovulation induction in anovulatory or oligo-ovulatory women and for oocyte maturation trigger in assisted reproductive technology (ART) cycles.
  - FDA-approved indication for the treatment of hypogonadotropic hypogonadism in adult males, where it acts as an LH analog to stimulate intratesticular testosterone and support spermatogenesis.
  - "Cryptorchidism indication: pre-treatment of cryptorchidism not caused by anatomic obstruction (typically pediatric)."
  - In male fertility/ART, used to mimic the mid-cycle LH surge and to maintain Leydig-cell steroidogenesis when gonadotropins are deficient.
  who_is_tracking_this:
  - Patients and clinicians managing ART cycles (IVF/ICSI) where hCG is the established oocyte-maturation trigger.
  - Men with hypogonadotropic hypogonadism on combined gonadotropin therapy (hCG plus FSH) for fertility.
  - Biohackers and self-experimenters using compounded or research-market hCG alongside or after exogenous testosterone, outside approved indications.
  - Pharmacists and inventory users verifying IU-labeled vials.
  common_user_goals:
  - Verify label, IU amount, route, and source before logging inventory.
  - Distinguish approved hCG products from compounded or research-market versions in tracking and inventory.
  - Record lab, schedule, and tolerability context (without dosing or protocol guidance).

evidence:
  tier: approved_label
  mechanism_targets:
  - Luteinizing hormone / chorionic gonadotropin receptor (LHCGR) on ovarian theca and granulosa cells and on testicular Leydig cells
  - Corpus luteum maintenance and progesterone production
  - Intratesticular testosterone production via Leydig-cell LHCGR activation
  claim_summary:
  - hCG is a 237-amino-acid placental glycoprotein heterodimer (α-subunit shared with LH/FSH/TSH; β-subunit distinct) that signals through LHCGR.
  - Approved injectable products include Novarel, Pregnyl, and Ovidrel (choriogonadotropin alfa, recombinant) for ovulation induction and ART trigger; various hCG products are approved for male hypogonadotropic hypogonadism.
  - In men with hypogonadotropic hypogonadism, hCG alone or with FSH can increase testicular volume and initiate or restore spermatogenesis.
  - In IVF/ICSI cycles, a single hCG bolus (~5,000–10,000 IU or 250 µg recombinant) is the standard oocyte-maturation trigger administered ~34–36 hours before retrieval.
  evidence_gaps:
  - Web-research tools were unavailable during this record build, so URL-level claims rely on FDA-approved labeling, DailyMed, and PubChem/PMC stable identifiers rather than freshly verified pulls; reviewers should confirm URLs resolve and content matches.
  - Off-label male use of hCG alongside or after exogenous testosterone (commonly discussed in TRT/PCT communities) is not an FDA-approved indication; long-term outcome data in that context are limited.
  - "'hCG diet' weight-loss protocols (500 IU/day for 6 weeks) were the subject of an FDA/FTC warning letter for unapproved claims and lack of evidence; this reference does not endorse that use."
  - Sources of compounded hCG may differ in identity, purity, and potency from approved products; product-specific verification is required.
  regulatory_status:
    status: approved
    region: US
    summary: Multiple hCG products (urinary-derived and recombinant) are FDA-approved for ovulation induction, ART oocyte-maturation trigger, and male hypogonadotropic hypogonadism.
    citation_ids:
    - dailymed-hcg
    - pubchem-hcg
    source_quality: label-backed
    limitations: Human chorionic gonadotropin acts like LH at the testicular LH receptor and is commonly tracked in fertility and testosterone-support contexts. Useful records include vial concentration, reconstitution, injection timing, concurrent TRT or fertility medications, labs, and subjective effects such as libido, mood, or testicular volume.

risks:
  by_route:
    subq:
      known_contraindications:
      - Primary ovarian failure (per approved labeling for fertility indications).
      - Uncontrolled thyroid or adrenal dysfunction.
      - Prior hypersensitivity to hCG or to a product-specific excipient.
      - Pregnancy (hCG is not indicated in pregnancy; ART trigger protocols are pre-pregnancy).
      - For the cryptorchidism indication, prostatic carcinoma or other androgen-dependent neoplasia.
      - Precocious puberty (pediatric cryptorchidism context).
      caution_populations:
      - Women with ovarian cysts or enlarged ovaries not due to PCOS.
      - Patients at risk of ovarian hyperstimulation syndrome (OHSS).
      - Men with prior or current androgen-dependent tumors.
      negative_stack_flags:
      - Concomitant GnRH agonist/antagonist use alters expected response in ART.
      formulation_risks:
      - Lyophilized hCG must be reconstituted with the labeled diluent; incorrect diluent volume breaks concentration math and inventory tracking.
      - Improperly reconstituted or stored product can lose potency and sterility.
      unknowns:
      - Long-term safety of repeated hCG exposure in off-label, non-ART male-use contexts.
    im:
      known_contraindications:
      - Same as subq per approved labeling.
      caution_populations:
      - Same as subq per approved labeling.
      negative_stack_flags:
      - Same as subq per approved labeling.
      formulation_risks:
      - Same as subq plus deeper-tissue injection considerations; product is the same IU-labeled biologic.
      unknowns:
      - Same as subq.

tracking:
  useful_logs:
  - product name and lot
  - stated IU per vial and diluent volume
  - reconstitution date and remaining IU estimate
  - storage notes (refrigerated vs room-temperature per label)
  - scheduled vs administered entries with timestamps
  - any reported tolerability or adverse-event note
  - relevant labs (testosterone, LH, FSH, estradiol, hCG trigger day for ART) without interpretation
  inventory_fields:
  - product-name
  - lot
  - expiration
  - source-or-prescription
  - stated-iU-per-vial
  - diluent-volume
  - reconstitution-date
  - route-on-label
  - vial-state (sealed / reconstituted / active / finished / expired)
  peppi_actions:
  - log-injection
  - log-reconstitution
  - flag-non-approved-source
  - prompt-route-confirmation
  - prompt-vial-state-confirmation

pharmacokinetics:
  half_life_hours: 29
  half_life_source: "Ovidrel prescribing information describes hCG elimination after subcutaneous choriogonadotropin alfa with mean terminal half-life about 29 plus or minus 6 hours."
  source_ids:
    - dailymed-ovidrel
  evidence_tier: approved_label
  model_notes: "First-order estimated remaining amount only; Ovidrel recombinant choriogonadotropin alfa PK may not match urinary-derived, compounded, or research-market hCG products and does not represent measured concentration, clinical response, fertility response, or dose guidance."

app_profile:
  headline: "FDA-approved placental glycoprotein hormone that signals through LHCGR; used for ART oocyte trigger, ovulation induction, and male hypogonadotropic hypogonadism."
  summary: "hCG is an LH-mimicking hormone commonly tracked around fertility, testicular function, and testosterone-support protocols. Useful tracking keeps concentration, reconstitution, dosing cadence, concurrent TRT or fertility medications, labs, and subjective response together."
  why_people_care:
  - Standard oocyte-maturation trigger in IVF/ICSI cycles.
  - Approved option for fertility-preserving treatment of male hypogonadotropic hypogonadism.
  - Off-label use in men on exogenous testosterone to maintain testicular function is heavily discussed in TRT/PCT communities despite limited evidence.
  what_to_verify:
  - Exact product name, lot, expiration, and source or prescription.
  - IU per vial and diluent volume against the label.
  - Reconstitution date and current vial state.
  - Route as written on the label (subcutaneous vs intramuscular).
  - Whether the product is an approved FDA-labeled biologic or a compounded/research-market version.
  what_to_track:
  - Product, lot, IU, diluent volume, reconstitution date, storage notes.
  - Schedule adherence and missed entries.
  - User-entered tolerability or adverse-event notes.
  - Relevant labs (testosterone, LH, FSH, estradiol, ART trigger day) without interpretation.
  reality_check: "This record was assembled without live web access during this run. URL-level claims point to DailyMed, PubChem, and PubMed/PMC stable identifiers and should be re-verified by a reviewer. Off-label male use of hCG (TRT/PCT) is not an FDA-approved indication, and the FTC has warned against marketing hCG for weight loss. the tracking record does not interpret labs or design protocols."

