schema_version: 1
compound_id: pinealon
status: approved
updated_at: "2026-06-19"

identity:
  name: Pinealon
  aliases:
    - EDR
    - Glu-Asp-Arg
    - Pineal peptide bioregulator
  non_aliases:
    - Epitalon
    - Epithalamin
  compound_type: peptide
  categories:
    - longevity
    - cognitive

forms:
  primary_route: subq
  supported_routes:
    - subq
    - intranasal
  excluded_routes:
    - route: oral
      reason: "Peptide is subject to gastrointestinal proteolysis; no oral formulation has been demonstrated in published literature."
  form_factors:
    - lyophilized-powder
  verification_fields:
    - sequence
    - purity
    - mass-spec-confirmation

positioning:
  why_use_this_compound:
    - "Short Khavinson-school 'bioregulator' tripeptide hypothesized to influence gene expression in neural and pineal tissue."
    - "Preclinical interest in neuroprotection and oxidative-stress reduction in cell-culture and rodent models."
    - "Marketed in Russia within the anti-aging and longevity space."
  who_is_tracking_this:
    - longevity-curious biohackers exploring Russian bioregulator peptides
    - users stacking short peptides for cognitive and neuroprotective experimentation
    - users already running Epitalon who want to layer in a 'daytime' bioregulator
  common_user_goals:
    - subjective cognitive maintenance and mental clarity
    - perceived energy and well-being on long anti-aging protocols
    - exploratory neuroprotection

evidence:
  tier: preclinical
  mechanism_targets:
    - hypothesized direct DNA-promoter interaction (Khavinson model)
    - reduction of reactive oxygen species in neuronal culture (preclinical)
  claim_summary:
    - "Tripeptide Glu-Asp-Arg (EDR) developed by the Khavinson group at the St Petersburg Institute of Bioregulation and Gerontology."
    - "Preclinical reports describe neuroprotective effects in rodent and cell-culture models."
    - "No registered human clinical trials located on ClinicalTrials.gov or WHO ICTRP."
  evidence_gaps:
    - No FDA-recognized human clinical trials.
    - Evidence base is dominated by a single research lineage (Khavinson group) with sparse independent Western replication.
    - The direct peptide-to-DNA mechanism proposed by Khavinson is not accepted in mainstream pharmacology.

risks:
  by_route:
    subq:
      - "No formal human safety database; adverse-event profile is not characterized in peer-reviewed Western literature."
      - "Sterility and identity depend entirely on supplier QC in an unregulated research-chemical market."
    intranasal:
      - "No formal human safety database for the intranasal route."
      - "Nasal mucosa tolerability is uncharacterized in published trials."

tracking:
  useful_logs:
    - subjective cognition / clarity rating
    - sleep quality
    - mood
  inventory_fields:
    - vial-mg
    - reconstitution-volume
    - lot-number
    - supplier
  peppi_actions:
    - log-subjective-cognition
    - log-sleep
    - flag-source-quality

app_profile:
  headline: "Russian-developed short peptide (Glu-Asp-Arg) from the Khavinson bioregulator family, explored for neuroprotection and cognitive aging."
  summary: "Pinealon is a short synthetic peptide marketed and researched around neuroendocrine, sleep, and aging-related signaling. Useful tracking emphasizes source, preparation, timing, sleep, cognition, mood, tolerability, and any objective markers being followed."
  why_people_care:
    - part of the 'Khavinson short peptide' longevity stack alongside Epitalon
    - reported subjective cognitive sharpening without stimulant feel
    - preclinical neuroprotection signal in oxidative-stress and ischemia models
  what_to_verify:
    - sequence (Glu-Asp-Arg) and purity on the vendor COA
    - mass-spec confirmation, lot, and supplier reputation given the gray market
  what_to_track:
    - subjective cognition, mental clarity, and mood on a simple daily rating
    - sleep quality and any subtle shifts in energy
    - any injection-site or nasal reactions
  reality_check: "Almost all human-relevant claims trace back to one Russian research lineage; treat clinical effects as unproven and assume the supply chain is the biggest unknown."

