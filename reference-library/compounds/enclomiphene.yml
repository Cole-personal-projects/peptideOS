claims:
  - id: identity-class
    text: Enclomiphene is the trans-isomer of clomiphene, an orally administered selective estrogen receptor modulator.
    claim_type: identity
    evidence_level: human_limited
    route_scope: []
    source_ids:
      - pub-wiehle-2013
    confidence: high
    limitations: []
  - id: mechanism-hpg
    text: Enclomiphene acts as an estrogen receptor antagonist at the hypothalamus, increasing LH and FSH and thereby endogenous testosterone production in men with secondary hypogonadism.
    claim_type: mechanism
    evidence_level: human_limited
    route_scope:
      - oral
    source_ids:
      - pub-wiehle-2013
      - pubmed-25044085
    confidence: high
    limitations: []
  - id: evidence-phase2-sperm
    text: In a randomized phase II trial in men with secondary hypogonadism, enclomiphene citrate increased serum total testosterone and gonadotropins while preserving sperm production, in contrast to topical testosterone.
    claim_type: evidence
    evidence_level: human_limited
    route_scope:
      - oral
    source_ids:
      - pubmed-25044085
    confidence: high
    limitations:
      - Phase II evidence; not a definitive efficacy or long-term safety endpoint.
  - id: regulatory-not-approved
    text: Enclomiphene citrate is not currently FDA-approved for male hypogonadism, fertility, or any other indication.
    claim_type: regulatory
    evidence_level: unknown
    route_scope:
      - oral
    source_ids: []
    confidence: low
    limitations:
      - Absence-of-approval statement based on review of trial documentation and regulatory history; users should confirm current FDA status directly.
  - id: risk-serm-class
    text: SERMs in the clomiphene family are associated with visual disturbances and mood changes.
    claim_type: risk
    evidence_level: human_limited
    route_scope:
      - oral
    source_ids:
      - meta-2025
    confidence: medium
    limitations:
      - Specific incidence rates and severity should be confirmed from the cited meta-analysis and clomiphene labels.
