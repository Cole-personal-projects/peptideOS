schema_version: 1
compound_id: enclomiphene
status: approved
updated_at: "2026-06-19"

identity:
  name: Enclomiphene citrate
  aliases:
    - Androxal
    - trans-clomiphene
  non_aliases:
    - Clomiphene citrate
    - Zuclomiphene
  compound_type: small-molecule
  categories:
    - hormone-endocrine
    - sexual-reproductive

forms:
  primary_route: oral
  supported_routes:
    - oral
  excluded_routes:
    - route: subq
      reason: Studied and developed as an oral selective estrogen receptor modulator; no published human injectable formulation.
    - route: im
      reason: Studied and developed as an oral SERM; no published human injectable formulation.
    - route: intranasal
      reason: No published human pharmacokinetic or efficacy data for intranasal administration.
    - route: topical
      reason: No published human pharmacokinetic or efficacy data for topical administration.
  form_factors:
    - oral capsule
    - oral tablet
  verification_fields:
    - prescription_source
    - compounding_pharmacy
    - lot_number
    - purity_documentation

positioning:
  why_use_this_compound:
    - Investigational oral SERM studied for raising endogenous testosterone in men with secondary hypogonadism while preserving spermatogenesis.
    - Of interest to men weighing fertility preservation against exogenous testosterone therapy.
  who_is_tracking_this:
    - Men with secondary hypogonadism considering fertility-preserving options.
    - Clinicians and self-experimenters comparing SERMs to exogenous testosterone.
  common_user_goals:
    - Understand the trial evidence in secondary hypogonadism.
    - Understand the current FDA approval status and regulatory limits.

evidence:
  tier: human_limited
  mechanism_targets:
    - Estrogen receptor antagonism at the hypothalamus
    - Increased GnRH pulsatility leading to increased LH and FSH
    - Downstream increase in endogenous testosterone production
  claim_summary:
    - Enclomiphene is the trans-isomer of clomiphene, an oral selective estrogen receptor modulator.
    - Phase II trials reported increases in serum total testosterone, LH, and FSH in men with secondary hypogonadism while preserving sperm production, compared with topical testosterone.
    - Enclomiphene is not FDA-approved for hypogonadism or fertility.
  evidence_gaps:
    - No FDA approval for any indication.
    - Long-term safety beyond trial durations is not well characterized.
    - Comparative data versus clomiphene and other SERMs in modern populations remain limited.

risks:
  by_route:
    oral:
      - Visual disturbances are a known class effect of clomiphene-family SERMs and should be considered.
      - Mood changes have been reported with SERMs in this class.
      - Because enclomiphene is not FDA-approved, products from compounding pharmacies may vary in identity and purity.

tracking:
  useful_logs:
    - morning total testosterone
    - LH and FSH
    - estradiol
    - semen analysis when relevant
    - mood
    - visual symptoms
    - any adverse symptoms
  inventory_fields:
    - prescription_source
    - compounding_pharmacy
    - lot_number
    - dosage_strength
    - storage_conditions
  peppi_actions:
    - flag_not_fda_approved
    - require_lab_baseline_before_logging

pharmacokinetics:
  half_life_hours: 10
  half_life_source: "Published human pharmacodynamic and pharmacokinetic study reports enclomiphene was rapidly absorbed with an elimination half-life about 10 hours."
  source_ids:
    - pub-wiehle-2013
  evidence_tier: human_limited
  model_notes: "First-order estimated remaining amount only; investigational enclomiphene PK does not establish compounded product behavior, clinical response, fertility response, or dose guidance."

app_profile:
  headline: Oral SERM with phase II evidence for raising testosterone in secondary hypogonadism while preserving fertility; not FDA-approved.
  summary: "Enclomiphene is the trans-isomer SERM used to stimulate endogenous LH and FSH signaling in male hormone contexts. Useful tracking connects dose schedule, fertility goals, testosterone and gonadotropin labs, mood, libido, vision symptoms, and side effects."
  why_people_care:
    - Possibility of raising endogenous testosterone without suppressing spermatogenesis.
    - Oral administration vs. injectable testosterone.
  what_to_verify:
    - Source and identity of any compounded product.
    - Baseline labs before and during use.
  what_to_track:
    - Total testosterone, LH, FSH, estradiol, and semen analysis when relevant.
    - Mood and visual symptoms.
  reality_check: Despite multiple trials and FDA filings, enclomiphene is not approved by the FDA. Long-term safety beyond trial durations is not well characterized, and SERM class effects (visual, mood) should be respected.

sources:
