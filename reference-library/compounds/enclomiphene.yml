    year: 2012
  - id: pub-wiehle-2013
    title: Testosterone restoration using enclomiphene citrate in men with secondary hypogonadism a pharmacodynamic and pharmacokinetic study
    url: https://bjui-journals.onlinelibrary.wiley.com/doi/full/10.1111/bju.12363
    source_type: publication
    publisher: BJU International
    year: 2013
  - id: meta-2025
    title: Clomiphene or enclomiphene citrate for the treatment of male hypogonadism a systematic review and meta-analysis of randomized controlled trials
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC12510335/
    source_type: review
    publisher: PMC
