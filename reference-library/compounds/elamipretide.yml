positioning:
  why_use_this_compound:
  - Mitochondria-targeted tetrapeptide that binds cardiolipin on the inner mitochondrial membrane, studied for restoring mitochondrial function in disease and aging contexts.
  - Phase 2 and phase 3 trials in primary mitochondrial myopathy and Barth syndrome give it more clinical data than most peptides in this space.
  who_is_tracking_this:
  - People with diagnosed mitochondrial disease following Stealth BioTherapeutics' trial program.
  - Longevity-focused self-experimenters interested in cardiolipin and mitochondrial bioenergetics.
  - Athletes and recovery-focused users exploring fatigue and exercise tolerance angles.
  common_user_goals:
  - Improved energy, reduced fatigue, faster recovery from exertion.
  - Support for declining mitochondrial function with age.
  - Investigational use for muscle, cardiac, or ophthalmic mitochondrial pathology.
evidence:
  tier: identity_only
  mechanism_targets:
  - mitochondrial inner-membrane context
  - cardiolipin-associated pathway research
  claim_summary:
  - Elamipretide is a small tetrapeptide (D-Arg-2',6'-dimethylTyr-Lys-Phe) that accumulates in the inner mitochondrial membrane via cardiolipin binding.
  - It has been evaluated in phase 2 and phase 3 trials for primary mitochondrial myopathy (MMPOWER series), Barth syndrome, dry AMD, and heart failure with preserved ejection fraction.
  - Results across trials have been mixed; FDA has not approved elamipretide for any indication as of this writing.
  evidence_gaps:
  - No approved indication; trial readouts have been inconsistent across endpoints.
  - Long-term safety beyond trial durations is not well characterized.
  - Effects in healthy users (vs. mitochondrial-disease populations) are essentially uncharacterized.
