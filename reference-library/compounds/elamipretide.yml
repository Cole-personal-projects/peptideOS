app_profile:
  headline: Mitochondria-targeted peptide with real trial data but no approved indication yet.
  summary: "Elamipretide is a mitochondria-targeted tetrapeptide studied for cardiolipin stabilization and mitochondrial function. Practical tracking ties formulation, route, timing, energy, exercise tolerance, fatigue, symptom changes, and objective markers together."
  why_people_care:
  - One of the few longevity-adjacent peptides with phase 3 data.
  - Specific, well-defined mechanism (cardiolipin binding) rather than a vague anti-aging pitch.
  - Direct mitochondrial angle for fatigue, exercise tolerance, and mitochondrial-disease populations.
  what_to_verify:
  - Label name matches an alias (Elamipretide, SS-31, MTP-131, Bendavia).
  - Vial amount in mg and reconstitution volume.
  - COA, lot number, and expiration from the source.
  what_to_track:
  - Subjective energy, fatigue, and exercise recovery.
  - Injection-site reactions.
  - Any relevant labs or functional tests if working with a clinician.
  reality_check: Mixed trial results in actual mitochondrial-disease patients should temper expectations in healthy users with intact mitochondria.
