positioning:
  why_use_this_compound:
    - Short, pulsatile GHRH stimulus that works with the body's own GH rhythm rather than overriding it with exogenous HGH.
    - Long clinical pedigree as the original FDA-approved GHRH(1-29) agent (Geref) before the commercial product was pulled in 2008.
    - Cleaner pharmacology than longer-acting GHRH analogs (CJC-1295, modified GRF 1-29) for users who want a short half-life and night-time pulse.
  who_is_tracking_this:
    - Anti-aging and longevity users on compounded sermorelin from a licensed US pharmacy.
    - Sleep, recovery, and body-composition optimizers experimenting with GH-axis support.
    - Users running it solo or comparing it against CJC-1295, tesamorelin, or ipamorelin stacks.
  common_user_goals:
    - Deeper sleep and better next-day recovery.
    - Modest body-composition shifts (fat loss, lean mass preservation) over months, not weeks.
    - Bumping IGF-1 into a higher youthful range without supraphysiologic HGH levels.

evidence:
  tier: approved_label
  mechanism_targets:
    - GHRH receptor (GHRHR) on anterior pituitary somatotrophs
  claim_summary:
    - Synthetic 1-29 N-terminal fragment of human GHRH — the minimum sequence needed to bind the pituitary GHRH receptor and trigger endogenous GH release.
    - Originally FDA-approved as Geref (Serono) for pediatric GH deficiency and as Geref Diagnostic for GH-stimulation testing in adults; commercial product discontinued around 2008.
    - Currently available in the US only as a compounded preparation from licensed compounding pharmacies; compounded versions do not carry an FDA-approved end-product label.
    - Very short plasma half-life (roughly 10-20 minutes), which is why bedtime dosing is the common pattern in user protocols.
  evidence_gaps:
    - No active FDA-approved consumer product means no current label to anchor wellness or anti-aging dosing.
    - Long-term safety and efficacy data for chronic off-label adult use are sparse.
    - Head-to-head comparisons against tesamorelin, CJC-1295, and ipamorelin in healthy adults are limited.

risks:
  by_route:
    subq:
      - Injection-site reactions (redness, pain, swelling) were the most common adverse events on the original Geref label.
      - Headache, flushing, dysgeusia (metallic taste), and transient post-injection hyperglycemia are reported across the GHRH class.
      - Compounded products are not FDA-approved end products — sterility, identity, and potency depend on the compounding pharmacy.

tracking:
  useful_logs:
    - Sleep quality and duration
    - Recovery and training tolerance
    - Body composition trends
    - IGF-1 labs over time
    - Injection-site reactions
  inventory_fields:
    - vial amount (mg)
    - reconstitution volume
    - concentration (mg/mL)
    - lot number
    - expiration
    - storage temperature
    - source / pharmacy
  peppi_actions:
    - Build a schedule preview from a confirmed prescriber template.
    - Surface overlap warnings when another GH-axis compound is already active.
    - Prompt for IGF-1 lab cadence based on user-entered baseline.

pharmacokinetics:
  half_life_hours: 0.108
  half_life_source: "Sermorelin product characteristics describe plasma half-life of 6 to 7 minutes after intravenous administration."
  source_ids:
    - hpra-sermorelin-spc
  evidence_tier: approved_label
  model_notes: "First-order estimated remaining amount uses short IV sermorelin plasma half-life only; it does not model downstream GH or IGF-1 response, compounded product behavior, clinical response, or dose guidance."

app_profile:
  headline: GHRH(1-29) — the original short-acting GH secretagogue.
  summary: "Sermorelin is a GHRH analog used to stimulate endogenous growth-hormone pulses. Useful tracking ties bedtime or fasting timing to sleep, recovery, body-composition goals, injection reactions, stack pairing, and IGF-1 response."
  why_people_care:
    - Preserves natural pulsatile GH release instead of replacing it.
    - Decades of clinical history compared to newer grey-market GHRH analogs.
    - Short half-life means a clean bedtime pulse with no daytime spillover.
  what_to_verify:
    - Source is a licensed US compounding pharmacy with a real prescriber relationship.
    - Vial identity, concentration, lot, and storage match what was prescribed.
    - Whether the vial is plain sermorelin or a modified/longer-acting GHRH analog (easy to confuse).
  what_to_track:
    - Sleep depth, morning energy, and training recovery.
    - IGF-1 at baseline and 8-12 weeks in.
    - Injection-site reactions and any GI or flushing symptoms after dosing.
  reality_check: Sermorelin raises GH and IGF-1 modestly — it is not exogenous HGH and won't produce HGH-level body recomposition. The original Geref label is the strongest evidence base; broader anti-aging claims outrun that data.

