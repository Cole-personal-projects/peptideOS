app_profile:
  headline: Topical copper peptide with the strongest dermatology evidence of any peptide on the cosmetic shelf.
  summary: "GHK-Cu is a copper-binding peptide commonly used in skin, hair, and recovery-oriented cosmetic routines. Useful tracking separates topical and injectable use, concentration, treatment area, photos, skin response, irritation, discoloration, and cycle timing."
  why_people_care:
  - Real dermatology evidence behind anti-aging and wound-healing claims
  - Works well alongside retinoids, niacinamide, and peptide stacks in a routine
  - Affordable entry point into copper-peptide skincare
  what_to_verify:
  - Topical vs injectable form and concentration on the label
  - Vehicle and pH for serums (extreme pH degrades the copper complex)
  - Lot, expiration, and source
  what_to_track:
  - Before / after photos under consistent lighting
  - Irritation, color changes, or staining
  - Skin texture, firmness, and hair-density observations over 8 to 12 weeks
  reality_check: The dermatology evidence is for topical use. Injectable GHK-Cu is grey-market and not what the published studies tested.
