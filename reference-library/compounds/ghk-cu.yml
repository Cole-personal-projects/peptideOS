positioning:
  why_use_this_compound:
  - Decades of dermatology evidence for skin barrier, wrinkles, and wound repair
  - Found in mainstream cosmetic serums - the topical route is the validated one
  - Hair-loss and scalp formulations frequently include GHK-Cu
  who_is_tracking_this:
  - Skincare-focused users running copper-peptide serums alongside actives
  - Hair-loss stackers combining topical minoxidil, finasteride, and GHK-Cu
  - Wound-healing and post-procedure recovery users
  common_user_goals:
  - Improve skin firmness, texture, and barrier function
  - Slow visible aging without prescription topicals
  - Support hair density and scalp health
evidence:
  tier: preclinical
  mechanism_targets:
  - Copper-binding tripeptide derived from a naturally occurring plasma fragment
  - Promotes extracellular matrix remodeling, collagen and elastin synthesis
  - Modulates wound-healing signaling and antioxidant response
  claim_summary:
  - Endogenous copper tripeptide first characterized by Loren Pickart in 1973
  - Topical use is the established route - shown in dermatology trials to improve skin elasticity, reduce fine lines, and aid healing
  - Included in many OTC cosmetic serums at concentrations typically 0.05 to 2 percent
  - Hair studies suggest follicular stimulation and reduced 5-alpha reductase activity in vitro
  evidence_gaps:
  - Most clinical work uses topical formulations - injectable use lacks controlled human trials
  - Cosmetic studies are often small, industry-funded, or open-label
  - Optimal concentration, vehicle, and frequency are not well-standardized
risks:
  by_route:
    topical:
    - Mild irritation, contact dermatitis, or transient redness possible
    - Copper staining of light fabrics with some formulations
    - Avoid combining with strong acids (Vitamin C, glycolic) in the same application - can destabilize the copper complex
    subq:
    - Injection-site reactions and grey-market source quality concerns
    - Injectable use is not the validated route and lacks the dermatology evidence base
