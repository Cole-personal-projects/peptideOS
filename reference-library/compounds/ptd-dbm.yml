schema_version: 1
compound_id: ptd-dbm
status: approved
updated_at: "2026-06-19"

identity:
  name: PTD-DBM
  aliases:
    - Protein Transduction Domain - Dishevelled Binding Motif
    - CXXC5-Dvl disrupting peptide
  non_aliases: []
  compound_type: peptide
  categories:
    - skin-hair

forms:
  primary_route: topical
  supported_routes:
    - topical
  excluded_routes:
    - route: subq
      reason: "Published efficacy work uses topical application to skin; no subcutaneous protocol established."
    - route: im
      reason: "No intramuscular research; designed for local cutaneous delivery to hair follicles."
    - route: intranasal
      reason: "Not relevant to indication; no intranasal research."
    - route: oral
      reason: "Peptide is subject to gastrointestinal proteolysis; no oral formulation studied."
  form_factors:
    - topical-solution
    - lyophilized-powder
  verification_fields:
    - sequence
    - purity
    - mass-spec-confirmation
    - vehicle-composition

positioning:
  why_use_this_compound:
    - "Targets CXXC5, a negative-feedback brake on Wnt/beta-catenin signaling that keeps hair follicles dormant."
    - "Reactivating Wnt in the dermal papilla is a fundamentally different mechanism from minoxidil and 5-alpha-reductase inhibitors."
    - "Often stacked with valproic acid (a GSK3-beta inhibitor) to amplify Wnt activation in DIY protocols."
  who_is_tracking_this:
    - androgenetic-alopecia biohackers who have plateaued on minoxidil and/or finasteride
    - users looking for a non-hormonal hair-loss approach
    - early-adopters of Wnt-pathway research peptides
  common_user_goals:
    - increased hair density and reduced shedding
    - extension of the anagen growth phase
    - regrowth in dormant or recently miniaturized areas

evidence:
  tier: preclinical
  mechanism_targets:
    - CXXC5-Dishevelled interaction disruption
    - canonical Wnt/beta-catenin pathway activation in dermal papilla
  claim_summary:
    - "Choi et al. 2017 (Journal of Investigative Dermatology) demonstrated hair regrowth and wound-induced hair neogenesis in mice with topical PTD-DBM."
    - "Effect is enhanced in combination with valproic acid (VPA), a GSK3-beta inhibitor and Wnt activator."
    - "No published Western human randomized controlled trials located; some early Korean clinical work exists."
  evidence_gaps:
    - Nearly all efficacy data is in mouse models.
    - Human data is limited to small early-stage Korean studies; no Western RCTs.
    - Optimal topical vehicle, concentration, and stability profile are not standardized across vendors.
    - Long-term effects of sustained cutaneous Wnt activation in humans are unknown.

risks:
  by_route:
    topical:
      - "No published large-scale human safety or tolerability dataset."
      - "Local skin irritation, contact dermatitis, and vehicle-related reactions are plausible but uncharacterized."
      - "Sustained Wnt-pathway activation has theoretical proliferative concerns that have not been studied in long-term human use."

tracking:
  useful_logs:
    - photo-density tracking under standardized lighting
    - daily shed count
    - application adherence and missed days
    - local skin reactions or irritation
  inventory_fields:
    - vial-mg
    - vehicle-volume
    - concentration
    - lot-number
    - supplier
  peppi_actions:
    - log-application
    - log-density-photo
    - log-skin-reaction

app_profile:
  headline: "Topical research peptide that disrupts CXXC5-Dishevelled binding to re-fire Wnt signaling in dormant hair follicles."
  summary: "PTD-DBM is an experimental Wnt-pathway peptide discussed around Dishevelled-PDZ signaling and hair-growth research. Useful tracking keeps source, batch, preparation, route, application area, photos, local response, and tolerability clear."
  why_people_care:
    - genuinely novel mechanism (Wnt reactivation) distinct from minoxidil and finasteride
    - mouse data on wound-induced hair neogenesis is dramatic
    - non-hormonal, which appeals to users avoiding finasteride side effects
  what_to_verify:
    - sequence and purity on the vendor COA
    - topical vehicle (often a DMSO or ethanol/PG blend) and concentration per mL
    - stability and storage conditions of the reconstituted solution
  what_to_track:
    - density and hairline photos under consistent lighting, monthly
    - shed count week-over-week
    - any scalp irritation, redness, or contact dermatitis
  reality_check: "Mouse data is impressive; human data is essentially anecdotal. Wnt activation is powerful biology, and pushing on it daily for years on human skin is genuinely uncharted territory."

