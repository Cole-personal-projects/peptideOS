claims:
  - id: identity-fusion
    text: "PTD-DBM is a fusion peptide combining a Protein Transduction Domain with the Dishevelled Binding Motif, designed to compete with CXXC5 for binding to Dishevelled."
    claim_type: identity
    evidence_level: identity
    source_ids:
      - choi-2017-jid
      - wiki-ptd-dbm
    confidence: high
    limitations: []
    route_scope: []
  - id: mechanism-cxxc5-dvl
    text: "CXXC5 binds Dishevelled and acts as a negative-feedback regulator of canonical Wnt/beta-catenin signaling; PTD-DBM disrupts this interaction."
    claim_type: mechanism
    evidence_level: preclinical
    source_ids:
      - choi-2017-jid
    confidence: high
    limitations: []
    route_scope: []
  - id: evidence-mouse-regrowth
    text: "Topical PTD-DBM, particularly when cotreated with valproic acid, induced hair regrowth and wound-induced hair neogenesis in mouse models."
    claim_type: evidence
    evidence_level: preclinical
    route_scope:
      - topical
    source_ids:
      - choi-2017-jid
    confidence: high
    limitations:
      - Mouse models do not guarantee human efficacy or safety.
  - id: evidence-no-human-rct
    text: "No published Western human randomized controlled trials of PTD-DBM were located."
    claim_type: evidence
    evidence_level: unknown
    route_scope:
      - topical
    source_ids: []
    confidence: low
    limitations:
      - Absence-of-evidence finding; non-indexed early-phase Korean trials may exist.
  - id: risk-topical-uncharacterized
    text: "Human topical safety, irritation, and long-term Wnt-activation effects are not characterized in published literature."
    claim_type: risk
    evidence_level: unknown
    route_scope:
      - topical
    source_ids: []
    confidence: low
    limitations:
      - Based on absence of published human safety data.
