app_profile:
  headline: FDA-approved melanocortin agonist that drives arousal centrally — and reliably makes you nauseous.
  summary: "Bremelanotide is a melanocortin receptor agonist used clinically for hypoactive sexual desire disorder. Useful tracking captures route, timing before use, onset, libido response, flushing, nausea, blood pressure, and repeat-dose tolerability."
  why_people_care:
  - Centrally-acting mechanism works when PDE5 inhibitors don't (desire vs erection problem)
  - Only FDA-approved drug for female HSDD that's not a daily oral
  - Works in both men and women despite only being approved for women
  what_to_verify:
  - Whether it's labeled Vyleesi (FDA-approved prefilled autoinjector) or research-market PT-141 (compounded vial)
  - Concentration (mg/mL) — Vyleesi is 1.75 mg/0.3 mL; research vials vary
  - Source quality for PT-141 (sterility and purity unverified in grey market)
  - Blood pressure status before first use
  what_to_track:
  - Onset, duration, and subjective effect each use
  - Nausea severity (many people quit because of this alone)
  - Cumulative skin pigmentation changes if used regularly
  reality_check: Roughly 40% of trial users got nauseous, ~13% severe enough to need antiemetics, and real-world adherence is poor. PT-141 works, but the side-effect profile is the reason it never became a blockbuster despite being the only approved drug in its class.
