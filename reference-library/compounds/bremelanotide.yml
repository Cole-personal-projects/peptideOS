positioning:
  why_use_this_compound:
  - Boost sexual desire and arousal via melanocortin signaling rather than vascular mechanisms (works on the brain, not just blood flow)
  - On-demand option that doesn't require daily dosing
  - Only FDA-approved medication for HSDD in premenopausal women (Vyleesi, 2019)
  who_is_tracking_this:
  - Premenopausal women with hypoactive sexual desire disorder using prescribed Vyleesi
  - Men and women using grey-market PT-141 for libido and erectile response off-label
  - Couples experimenting with on-demand arousal protocols
  common_user_goals:
  - Increase sexual desire and arousal in the hour-plus window after dosing
  - Find an option that works centrally when PDE5 inhibitors don't help
  - Add a non-hormonal lever to a sexual-health protocol
evidence:
  tier: approved_label
  mechanism_targets:
  - Melanocortin-4 receptor (MC4R) agonism in the central nervous system, driving sexual arousal pathways
  claim_summary:
  - FDA-approved as Vyleesi (June 2019) for acquired generalized HSDD in premenopausal women
  - Acts centrally at MC4R rather than peripherally on vascular smooth muscle, making it mechanistically distinct from PDE5 inhibitors
  - Onset roughly 45 minutes after subcutaneous injection; effect window of several hours
  - Nausea is the dominant side effect, reported by ~40% of users in trials (about 13% severe enough to use antiemetics)
  evidence_gaps:
  - Long-term real-world adherence has been poor; many users discontinue due to nausea
  - Not approved or systematically studied in men, though widely used off-label for erectile function
  - Blood pressure increases are documented in label and contraindicated in uncontrolled hypertension
risks:
  by_route:
    subq:
    - Nausea is the most common adverse effect (~40%); often improves with subsequent doses but causes many users to quit
    - Transient blood pressure increase and reflexive heart rate decrease — contraindicated in uncontrolled hypertension or cardiovascular disease
    - Focal hyperpigmentation of face, gums, and breasts in some users with repeated use (melanocortin pathway side effect)
    - Injection-site reactions
    - Grey-market PT-141 has the same sterility, identity, and concentration risks as any compounded peptide
tracking:
  useful_logs:
  - Time-to-onset and duration of effect
  - Subjective desire and arousal ratings
  - Nausea severity and duration
  - Blood pressure if cardiovascular risk factors present
  - Skin pigmentation changes with repeated use
