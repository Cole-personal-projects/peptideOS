  - id: "preclinical-lipolysis"
    text: "In obese mouse models, AOD-9604 reduced body weight and fat mass and was associated with increased beta-3 adrenergic receptor expression in adipose tissue, without elevating IGF-1."
    claim_type: mechanism
    evidence_level: preclinical
    route_scope: []
    source_ids:
      - "heffernan-2001-endocrinology"
    confidence: high
