schema_version: 1
compound_id: "aod-9604"
status: approved
updated_at: "2026-06-19"

identity:
  name: "AOD-9604"
  aliases:
    - "Anti-Obesity Drug 9604"
    - "Tyr-hGH 177-191"
    - "Modified hGH fragment 176-191 with N-terminal tyrosine"
  non_aliases:
    - "Not the same as the unmodified hGH fragment 176-191 — AOD-9604 has an added N-terminal tyrosine"
    - "Not human growth hormone; does not meaningfully activate the hGH receptor or raise IGF-1"
  compound_type: peptide
  categories:
    - metabolic
    - growth-hormone

forms:
  primary_route: oral
  supported_routes: [oral]
  excluded_routes:
    - route: subq
      reason: "Subcutaneous use exists in research but AOD-9604 is not an FDA-approved drug; injectable use is outside any approved channel"
    - route: im
      reason: "No approved injectable indication"
    - route: intranasal
      reason: "No published pharmacokinetic data supporting this route"
    - route: topical
      reason: "Marketed in some jurisdictions only as a cosmetic ingredient; not a systemic delivery route"
  form_factors: []
  verification_fields:
    - "Certificate of analysis confirming peptide identity, purity, and absence of full-length hGH contamination"

positioning:
  why_use_this_compound:
    - "Target the lipolytic effects of growth hormone without the growth-promoting (IGF-1-raising) side"
    - "Avoid the appetite, IGF-1, and glucose effects that come with full hGH or strong GH secretagogues"
    - "Use as a low-risk add-on in body-composition stacks"
  who_is_tracking_this:
    - "People in compounded peptide and longevity protocols"
    - "Biohackers focused on fat loss without disturbing endocrine markers"
    - "Clinics in Australia where it's marketed as a cosmetic ingredient"
  common_user_goals:
    - "Reduce body fat, especially visceral fat"
    - "Avoid water retention and insulin resistance associated with full GH"
    - "Pair with diet and training without adding hormonal load"

evidence:
  tier: human_limited
  mechanism_targets:
    - "Proposed stimulation of lipolysis and fat oxidation through pathways linked to beta-3 adrenergic receptor expression in adipocytes (preclinical)"
    - "Does not appreciably activate the hGH receptor or elevate IGF-1 in published preclinical models"
  claim_summary:
    - "Modified C-terminal hGH fragment developed by Metabolic Pharmaceuticals (Australia) in the 1990s as a non-hormonal fat-loss drug"
    - "Cleared multiple Phase II human obesity trials; the largest Phase IIb missed its primary endpoint"
    - "Obesity development program discontinued in 2007 after the Phase IIb result"
    - "Not FDA-approved; marketed in some jurisdictions only as a cosmetic ingredient"
  evidence_gaps:
    - "Phase IIb obesity trial did not show meaningful weight loss vs placebo — the headline negative result"
    - "Direct human measurements of lipolysis at compounded doses are sparse"
    - "Long-term safety data is thin; no Phase III ever ran"

risks:
  by_route:
    oral:
      - "Peptide is susceptible to gastrointestinal degradation; oral bioavailability not well characterized"

tracking:
  useful_logs:
    - "Source / lot / certificate of analysis"
    - "Body composition (weight, waist, body fat) over time"
    - "Subjective appetite and energy notes"
  inventory_fields:
    - "vendor"
    - "lot_number"
    - "coa_url"
  peppi_actions:
    - "Flag that AOD-9604 is not FDA-approved and that the largest human trial did not meet its endpoint"

app_profile:
  headline: "hGH fragment marketed for fat loss that quietly failed its largest human trial."
  summary: "AOD-9604 is a modified growth-hormone fragment researched for fat-metabolism signaling, with mixed clinical translation. Practical tracking focuses on formulation, dose timing, body-composition trend, appetite, training context, and local tolerability."
  why_people_care:
    - "Targets fat metabolism in preclinical models without raising IGF-1"
    - "Common add-on in compounded GLP-1 and peptide weight-loss protocols"
    - "Lower theoretical risk profile than full GH or strong secretagogues"
  what_to_verify:
    - "Source identity and purity via certificate of analysis"
    - "Regulatory status in your jurisdiction (FDA in US, TGA in Australia)"
    - "Whether it's bundled in a compounded blend (common in tirzepatide/AOD stacks)"
  what_to_track:
    - "Body composition trends (weight, waist, body fat %)"
    - "Appetite and energy"
    - "Fasting glucose if used alongside a GLP-1"
  reality_check: "The preclinical story is cleaner than the human results. AOD-9604 didn't beat placebo for weight loss in its biggest trial, the obesity program was abandoned almost 20 years ago, and most modern marketing leans on rodent data rather than the actual human readout."

sources:
  - id: "heffernan-2001-endocrinology"
    title: "The effects of human GH and its lipolytic fragment (AOD9604) on lipid metabolism following chronic treatment in obese mice and beta3-AR knock-out mice"
    url: "https://pubmed.ncbi.nlm.nih.gov/11606467/"
    source_type: publication
    publisher: "Endocrinology"
    year: 2001
  - id: "trimrx-aod9604-evidence-review"
    title: "AOD-9604: What the Research Actually Says (Evidence Review)"
    url: "https://trimrx.com/blog/aod-9604-research-review/"
    source_type: review
    publisher: "TrimRx"
    year: 2026

claims:
  - id: "identity"
    text: "AOD-9604 is a 16-amino-acid peptide consisting of hGH residues 177-191 with an N-terminal tyrosine added."
    claim_type: identity
    evidence_level: identity
    route_scope: []
    source_ids:
      - "heffernan-2001-endocrinology"
    confidence: high
    limitations: []
  - id: "preclinical-lipolysis"
    text: "In obese mouse models, AOD-9604 reduced body weight and fat mass and was associated with increased beta-3 adrenergic receptor expression in adipose tissue, without elevating IGF-1."
    claim_type: mechanism
    evidence_level: preclinical
    route_scope: []
    source_ids:
      - "heffernan-2001-endocrinology"
    confidence: high
    limitations:
      - "Findings have not translated cleanly to human studies"
  - id: "human-trials-discontinued"
    text: "AOD-9604 completed multiple Phase II human obesity trials; the largest Phase IIb did not meet its primary endpoint and development was discontinued in 2007."
    claim_type: evidence
    evidence_level: human_limited
    route_scope: []
    source_ids:
      - "trimrx-aod9604-evidence-review"
    confidence: medium
    limitations:
      - "Primary trial reports are not all openly indexed; this summary relies on a secondary evidence review"
  - id: "not-fda-approved"
    text: "AOD-9604 is not approved by the FDA as a therapeutic drug."
    claim_type: regulatory
    evidence_level: human_limited
    route_scope: []
    source_ids:
      - "trimrx-aod9604-evidence-review"
    confidence: high
    limitations: []
