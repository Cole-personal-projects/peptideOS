schema_version: 1
compound_id: "aod-9604"
status: approved
updated_at: "2026-06-19"

identity:
  name: "AOD-9604"
  aliases:
    - "Anti-Obesity Drug 9604"
    - "Tyr-hGH 177-191"
    - "Modified hGH fragment 176-191 with N-terminal tyrosine"
  non_aliases:
    - "Not identical to unmodified hGH fragment 176-191 (AOD-9604 adds an N-terminal tyrosine)"
    - "Not human growth hormone; lacks the full hGH receptor activity"
  compound_type: peptide
  categories:
    - metabolic
    - growth-hormone

forms:
  primary_route: oral
  supported_routes: [oral]
  excluded_routes:
    - route: subq
      reason: "Subcutaneous formulations exist in research but AOD-9604 is not an FDA-approved drug; injectable use is outside any approved channel"
    - route: im
      reason: "No approved injectable indication"
    - route: intranasal
      reason: "No published pharmacokinetic data supporting this route"
    - route: topical
      reason: "Marketed in some jurisdictions only as a cosmetic ingredient; not a systemic delivery route"
  form_factors: []
  verification_fields:
    - "Certificate of analysis confirming peptide identity, purity, and absence of full-length hGH contamination"

positioning:
  why_use_this_compound:
    - "Historically developed as a non-hormonal fat-loss candidate that targets the lipolytic effects of hGH without the growth-promoting effects"
    - "Studied as a potential body-composition aid"
  who_is_tracking_this:
    - "Biohackers interested in body composition"
    - "Practitioners using compounded peptide protocols"
  common_user_goals:
    - "Understand the evidence behind AOD-9604 for fat loss"
    - "Compare against other body-composition tools"

evidence:
  tier: human_limited
  mechanism_targets:
    - "Proposed stimulation of lipolysis and fat oxidation through pathways linked to beta-3 adrenergic receptor expression in adipocytes (preclinical)"
    - "Does not appreciably activate the hGH receptor or elevate IGF-1 in published preclinical models"
  claim_summary:
    - "AOD-9604 is a modified C-terminal hGH fragment developed by Metabolic Pharmaceuticals in Australia in the 1990s"
    - "Underwent multiple Phase II human trials for obesity; the largest Phase IIb did not meet its primary endpoint, and development for obesity was discontinued in 2007"
    - "Not approved by the FDA; marketed in some jurisdictions only as a cosmetic ingredient"
  evidence_gaps:
    - "No approved therapeutic indication for fat loss"
    - "Human direct-lipolysis measurements at clinically relevant doses are limited"
    - "Long-term safety data is sparse"

risks:
  by_route:
    oral:
      - "Peptide is susceptible to gastrointestinal degradation; oral bioavailability not well characterized"

tracking:
  useful_logs:
    - "Source / lot / certificate of analysis"
    - "Body composition (weight, waist, body fat) over time"
    - "Subjective appetite and energy notes"
  inventory_fields:
    - "vendor"
    - "lot_number"
    - "coa_url"
  peppi_actions:
    - "Flag that AOD-9604 is not FDA-approved and that the largest human trial did not meet its endpoint"

app_profile:
  headline: "Modified hGH fragment with mixed human-trial results and no FDA approval."
  summary: "AOD-9604 is a synthetic peptide based on the C-terminus of human growth hormone, originally developed as an anti-obesity drug candidate. Preclinical data showed lipolytic effects without hGH-like growth signaling, but the largest Phase IIb obesity trial did not reach its primary endpoint and the program was discontinued in 2007."
  why_people_care:
    - "Targets fat metabolism without the growth-promoting effects of full hGH in preclinical models"
    - "Familiar option in compounded peptide and longevity protocols"
  what_to_verify:
    - "Source identity and purity via certificate of analysis"
    - "Regulatory status in your jurisdiction (e.g., FDA, TGA)"
  what_to_track:
    - "Body composition trends"
    - "Any subjective changes in appetite, energy, or recovery"
  reality_check: "Despite a clean preclinical mechanism story, AOD-9604 did not show a convincing fat-loss effect in its largest human trial and is not approved by the FDA. Treat evidence for body-composition use as thin."

