schema_version: 1
compound_id: metformin
status: approved
updated_at: "2026-06-19"

identity:
  name: Metformin
  aliases:
    - Glucophage
    - Glumetza
    - Fortamet
    - Riomet
    - Dimethylbiguanide
  non_aliases:
    - Phenformin
    - Buformin
    - Berberine
  compound_type: small-molecule
  categories:
    - metabolic
    - longevity

forms:
  primary_route: oral
  supported_routes:
    - oral
  excluded_routes:
    - route: subq
      reason: No clinical formulation; oral bioavailability is sufficient and parenteral biguanide use is not standard.
    - route: im
      reason: No clinical formulation.
    - route: intranasal
      reason: No clinical formulation.
    - route: topical
      reason: No clinical formulation.
  form_factors:
    - immediate-release-tablet
    - extended-release-tablet
    - oral-solution
  verification_fields:
    - manufacturer
    - ndc_or_equivalent
    - formulation_ir_or_er
    - dose-per-tablet

positioning:
  why_use_this_compound:
    - First-line oral therapy for type 2 diabetes (FDA-approved as Glucophage since 1995, in clinical use globally since 1957)
    - Cheapest, most-studied, longest-tracked candidate geroprotector with a dedicated aging trial (TAME, led by Barzilai)
    - AMPK activation and partial mitochondrial complex I inhibition drive most of the longevity-side interest
  who_is_tracking_this:
    - People with type 2 diabetes or prediabetes on a clinician-supervised regimen
    - Longevity-focused users running it off-label for insulin sensitivity and aging biomarkers
    - Bryan Johnson / Attia-adjacent stacks tracking HbA1c, fasting insulin, and CGM data
  common_user_goals:
    - Lower fasting glucose and HbA1c
    - Improve insulin sensitivity
    - Bet on healthspan extension while TAME plays out

evidence:
  tier: approved_label
  mechanism_targets:
    - Hepatic gluconeogenesis (reduced)
    - Mitochondrial complex I (partial inhibition)
    - AMPK (activated)
    - mTOR (downstream inhibition, increased autophagy)
  claim_summary:
    - Lowers hepatic glucose output and improves peripheral insulin sensitivity.
    - Partially inhibits mitochondrial complex I, raising AMP/ATP and activating AMPK; downstream effects include mTOR inhibition and increased autophagy.
    - Longevity benefit in non-diabetic humans is hypothesized but unproven; TAME is the pivotal trial.
    - Some evidence suggests it may blunt exercise-induced mitochondrial adaptations in athletes (mixed).
  evidence_gaps:
    - No completed RCT proving healthspan extension in non-diabetic humans
    - Conflicting data on whether it blunts exercise/training adaptations
    - Optimal longevity-use dose (typically below diabetic dosing) is not established

risks:
  by_route:
    oral:
      - GI side effects (nausea, diarrhea, abdominal discomfort) especially during titration
      - Vitamin B12 deficiency with long-term use
      - Rare but serious lactic acidosis, especially in renal impairment or acute illness
      - Contraindicated/cautioned per FDA label in significant renal impairment
      - May blunt some exercise-induced mitochondrial adaptations (mixed evidence)

tracking:
  useful_logs:
    - Fasting glucose, HbA1c
    - GI tolerability during titration
    - Vitamin B12 (annual or per clinician)
    - Renal function (eGFR)
  inventory_fields:
    - manufacturer
    - formulation
    - dose-per-tablet
    - expiration
  peppi_actions:
    - prompt-b12-check
    - prompt-egfr-check

app_profile:
  headline: The cheapest, most-studied longevity bet — and still the gold-standard first-line drug for type 2 diabetes.
  summary: "Metformin is an oral biguanide used for glucose control and often tracked in metabolic and longevity-oriented routines. Useful tracking distinguishes IR versus ER, meal timing, GI tolerance, fasting glucose, A1c, appetite, training, and B12 monitoring."
  why_people_care:
    - Decades of safety data, generic, dirt cheap
    - Rock-solid glycemic control in T2D
    - Most credible non-rapamycin geroprotector candidate currently in trials
  what_to_verify:
    - Clinician supervision (prescription required)
    - Renal function (eGFR) before starting and periodically after
    - Formulation (IR vs ER) and per-tablet dose
  what_to_track:
    - Fasting glucose, HbA1c, fasting insulin
    - GI tolerability through the first 2-4 weeks
    - B12 status annually on long-term use
  reality_check: The longevity case is plausible and well-mechanistically grounded, but not yet proven in humans. Until TAME reports, the longevity use is a calculated bet, not a settled answer.

