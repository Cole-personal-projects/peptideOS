app_profile:
  headline: "Popular recovery peptide with strong preclinical buzz and thin human evidence."
  summary: "BPC-157 is a synthetic pentadecapeptide derived from a fragment of a protein found in human gastric juice. It has an extensive preclinical literature suggesting effects on tissue healing and GI protection, but published human trial data is very limited, and the FDA placed it on the 503A Category 2 bulks list in 2023."
  why_people_care:
    - "Anecdotal use for tendon, ligament, and gut healing is widespread"
    - "Animal model literature is broad across many tissue types"
  what_to_verify:
    - "Source identity and purity via certificate of analysis"
    - "Current regulatory and compounding status (FDA 503A list is being re-reviewed)"
  what_to_track:
    - "Symptom or injury trajectory over time"
    - "Any adverse effects, especially injection-site or immune-mediated"
  reality_check: "Most positive BPC-157 evidence comes from animal studies. Published human trials are sparse, and the FDA has flagged safety and impurity concerns serious enough to restrict compounded use. Treat reported benefits as hypothesis-generating, not established."

