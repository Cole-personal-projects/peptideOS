  why_use_this_compound:
    - "Investigated in animal models for tendon, ligament, muscle, and gastrointestinal healing"
    - "Popular in biohacking and recovery-focused protocols despite limited human evidence"
  who_is_tracking_this:
    - "Athletes and recovery-focused users"
    - "Practitioners and patients using compounded peptide protocols"
  common_user_goals:
    - "Understand the actual evidence base for BPC-157"
    - "Track regulatory status in their jurisdiction"

evidence:
  tier: preclinical
  mechanism_targets:
    - "Reported preclinical effects on angiogenesis, VEGFR2 signaling, nitric oxide pathways, and growth-factor-related healing responses"
    - "Reported preclinical effects on gastrointestinal mucosal protection"
  claim_summary:
    - "BPC-157 is a synthetic 15-amino-acid sequence derived from a fragment of a protein found in human gastric juice"
    - "Evidence base is dominated by preclinical (in vitro and animal) studies; published human clinical trial data is very limited"
    - "In September 2023, the FDA placed BPC-157 on the 503A Category 2 bulks list, restricting compounded use in the United States"
  evidence_gaps:
    - "Few high-quality randomized human trials"
    - "Long-term human safety data is lacking"
    - "Pharmacokinetics, oral bioavailability, and tissue distribution are poorly characterized in humans"

risks:
