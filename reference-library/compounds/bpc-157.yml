schema_version: 1
compound_id: "bpc-157"
status: approved
updated_at: "2026-06-19"

identity:
  name: "BPC-157"
  aliases:
    - "Body Protection Compound 157"
    - "Pentadecapeptide BPC 157"
    - "PL 14736"
  non_aliases:
    - "Synthetic 15-amino-acid sequence — not a naturally isolated human gastric protein"
  compound_type: peptide
  categories:
    - healing
    - immune

forms:
  primary_route: oral
  supported_routes: [oral]
  excluded_routes:
    - route: subq
      reason: "FDA placed BPC-157 on the 503A Category 2 bulks list in 2023, citing safety concerns with compounded use; injectable use is outside approved channels"
    - route: im
      reason: "No approved injectable indication"
    - route: intranasal
      reason: "No approved formulation; very limited published pharmacokinetics"
    - route: topical
      reason: "No approved topical formulation; bioavailability not characterized"
  form_factors: []
  verification_fields:
    - "Certificate of analysis confirming peptide sequence and purity"

positioning:
  why_use_this_compound:
    - "Accelerate soft-tissue healing — tendons, ligaments, muscle — based on extensive rodent data"
    - "Protect gastric mucosa and reduce NSAID-induced gut damage in animal models"
    - "Reach for an injury-recovery tool when conservative options have plateaued"
  who_is_tracking_this:
    - "Athletes recovering from tendon, ligament, or muscle injuries"
    - "Lifters and biohackers using compounded peptide protocols"
    - "People with chronic gut issues (IBD, NSAID-related) trying experimental options"
  common_user_goals:
    - "Recover faster from joint, tendon, or muscle injuries"
    - "Reduce gut inflammation or NSAID-related stomach damage"
    - "Get back to training without surgery when possible"

evidence:
  tier: preclinical
  mechanism_targets:
    - "Reported preclinical effects on angiogenesis, VEGFR2 signaling, nitric oxide pathways, and growth-factor-related healing responses"
    - "Reported preclinical effects on gastrointestinal mucosal protection"
  claim_summary:
    - "Synthetic 15-amino-acid sequence derived from a fragment of a protein in human gastric juice"
    - "Hundreds of rodent and in vitro studies, mostly from a small group of Croatian labs, suggest broad healing effects across tissue types"
    - "Published human trial data is extremely limited — essentially no high-quality RCTs"
    - "FDA added BPC-157 to the 503A Category 2 bulks list in September 2023, restricting compounded use in the US over safety and impurity concerns"
  evidence_gaps:
    - "Almost no high-quality randomized human trials; the entire popular reputation rests on animal work"
    - "Most preclinical data comes from a narrow group of researchers, raising independent-replication questions"
    - "Human pharmacokinetics, oral bioavailability, and tissue distribution are essentially uncharacterized"
    - "Long-term safety in humans is unknown; theoretical angiogenesis concerns around occult tumors have not been resolved"

risks:
  by_route:
    oral:
      - "Oral bioavailability and systemic exposure are not well characterized in humans"
      - "Grey-market product purity is variable; the FDA specifically flagged manufacturing impurities as a concern"

tracking:
  useful_logs:
    - "Source / lot / certificate of analysis"
    - "Symptom or injury location, severity, and trajectory over time"
  inventory_fields:
    - "vendor"
    - "lot_number"
    - "coa_url"
  peppi_actions:
    - "Flag FDA 503A Category 2 status and the lack of approved human indication before any tracking suggestion"

app_profile:
  headline: "The internet's favorite healing peptide — almost entirely on the back of rat studies."
  summary: "BPC-157 is a stable gastric-derived peptide studied in tissue-repair and inflammation models. Strong user-facing tracking separates route, concentration, target area, timing, injury context, pain or mobility changes, and local reactions."
  why_people_care:
    - "Anecdotal track record for tendon, ligament, and gut healing is unusually loud across forums and clinics"
    - "Animal-model literature spans dozens of tissue types and injury models"
    - "Few other peptides offer this much rodent data for soft-tissue recovery"
  what_to_verify:
    - "Source identity and purity via certificate of analysis"
    - "Current FDA 503A status (under active re-review)"
    - "Whether it's stable arginate salt vs free acid (arginate has better shelf-life claims)"
  what_to_track:
    - "Pain, range of motion, and function at the injury site over weeks"
    - "Injection-site or GI tolerability"
    - "Any unexpected systemic effects (it does cross tissues)"
  reality_check: "The gap between the rodent literature and the human evidence is enormous. Most BPC-157 enthusiasm extrapolates from animal models published by a handful of labs, the FDA has restricted compounded use over real safety concerns, and you're effectively running an N=1 experiment with unknown long-term risk."

sources:
  - id: "pmc-bpc157-review-2025"
    title: "Multifunctionality and Possible Medical Application of the BPC 157 Peptide—Literature and Patent Review"
    url: "https://www.ncbi.nlm.nih.gov/pmc/articles/PMC11859134/"
    source_type: review
    publisher: "International Journal of Molecular Sciences (PMC)"
    year: 2025
  - id: "fda-pcac-2023-503a"
    title: "FDA removes certain peptide bulk drug substances from Category 2 of interim 503A bulks list and sets dates for PCAC review"
    url: "https://www.lexology.com/library/detail.aspx?g=2e55b76a-3173-4e04-beda-bf021202f18d"
    source_type: regulatory
    publisher: "Lexology (summary of FDA action)"
    year: 2024

claims:
  - id: "identity"
    text: "BPC-157 is a synthetic 15-amino-acid peptide derived from a sequence within a protein found in human gastric juice."
    claim_type: identity
    evidence_level: identity
    route_scope: []
    source_ids:
      - "pmc-bpc157-review-2025"
    confidence: high
    limitations: []
  - id: "preclinical-healing"
    text: "Preclinical (in vitro and animal) studies report effects on angiogenesis, tendon and ligament healing, and gastrointestinal mucosal protection."
    claim_type: mechanism
    evidence_level: preclinical
    route_scope: []
    source_ids:
      - "pmc-bpc157-review-2025"
    confidence: high
    limitations:
      - "Findings have not been confirmed in adequately powered human trials"
  - id: "fda-category2"
    text: "In 2023, the FDA placed BPC-157 on the 503A Category 2 bulks list, restricting its use in compounded preparations in the United States while citing safety and impurity concerns."
    claim_type: regulatory
    evidence_level: human_limited
    route_scope: []
    source_ids:
      - "fda-pcac-2023-503a"
    confidence: high
    limitations:
      - "Status is under active re-review; the list may change"
  - id: "limited-human-data"
    text: "Published human clinical trial data for BPC-157 is very limited and does not establish efficacy or long-term safety for any indication."
    claim_type: evidence
    evidence_level: human_limited
    route_scope: []
    source_ids:
      - "pmc-bpc157-review-2025"
    confidence: high
    limitations: []
