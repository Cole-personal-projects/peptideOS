    text: TB-500 is described in research-market materials as an N-terminal acetylated 17-23 fragment of human Thymosin Beta-4 containing the actin-binding domain.
    claim_type: identity
    evidence_level: identity
    route_scope: []
    source_ids:
      - clinicaltrials-tb500-fragment
    confidence: medium
    limitations:
      - Vendor product identity is not independently verified by FDA.
  - id: identity-vs-tb4
    text: TB-500 is distinct from full-length Thymosin Beta-4, which is the molecule referenced in most peer-reviewed wound-healing and tissue-repair literature.
    claim_type: identity
    evidence_level: identity
    route_scope: []
    source_ids:
      - tb4-pmc-review
    confidence: high
    limitations: []
  - id: mechanism-actin-binding
    text: The 17-23 region of Thymosin Beta-4 corresponds to the actin-binding domain; full-length Tβ4 sequesters G-actin and has been studied for effects on cell migration, angiogenesis, and tissue repair.
    claim_type: mechanism
    evidence_level: preclinical
    route_scope: []
    source_ids:
      - tb4-pmc-review
    confidence: medium
    limitations:
      - Most mechanistic data come from full-length Tβ4, not the TB-500 fragment specifically.
  - id: regulatory-status
    text: TB-500 is not an FDA-approved drug product; it is sold as a research chemical.
    claim_type: regulatory
    evidence_level: identity
    route_scope: []
    source_ids:
      - clinicaltrials-tb500-fragment
    confidence: high
    limitations: []
  - id: risk-research-market
    text: Research-market peptide vials are not FDA-approved end-products and identity, sterility, concentration, and stability depend entirely on the supplier.
    claim_type: risk
    evidence_level: identity
    route_scope:
      - subq
      - im
    source_ids: []
    confidence: low
    limitations:
      - Statement is a general product-quality caveat for research-market peptides rather than a TB-500-specific finding in a peer-reviewed source.
