positioning:
  why_use_this_compound:
    - Mitochondrial-derived peptide tied to AMPK activation and metabolic homeostasis
    - Early-stage interest in metabolic and aging biology
  who_is_tracking_this:
    - Users experimenting with research-grade peptides for metabolic biomarkers
    - Researchers studying mitochondrial-derived peptides
  common_user_goals:
    - Insulin sensitivity
    - Exercise capacity
    - Metabolic resilience

evidence:
  tier: preclinical
  mechanism_targets:
    - AMPK (activated via folate / de novo purine pathway)
    - Skeletal muscle glucose handling
    - Mitochondrial stress response
  claim_summary:
    - 16-amino-acid peptide encoded within mitochondrial 12S rRNA; first characterized by Lee et al. 2015.
    - Preclinical data show improved insulin sensitivity, reduced obesity, and metabolic homeostasis effects.
    - Human data are limited; clinical translation is early-stage.
  evidence_gaps:
    - Very limited published human trial data
    - Long-term safety unknown
    - No regulatory approval

risks:
  by_route:
    subq:
      - Unregulated supply: purity and identity not verifiable without independent COA
      - Long-term safety unknown
      - Injection-site reactions possible
      - Unknown interactions with glucose-lowering medications

tracking:
  useful_logs:
    - Fasting glucose and insulin
    - HbA1c
    - Body composition
    - Exercise performance
    - Injection-site reactions
  inventory_fields:
    - vendor
    - lot_number
    - purity_coa
    - reconstitution_date
  peppi_actions:
    - flag-research-only
    - prompt-coa-upload

app_profile:
  headline: Mitochondrial-derived peptide with promising preclinical metabolic data and very thin human evidence.
  summary: MOTS-c is a 16-amino-acid peptide encoded within mitochondrial 12S rRNA, discovered by Lee and colleagues in 2015. It activates AMPK via the folate / de novo purine pathway and shows metabolic benefits in animal models. Human clinical evidence is early-stage.
  why_people_care:
    - Novel mitochondrial-encoded peptide tied to aging biology
    - Preclinical metabolic and exercise-capacity signals
  what_to_verify:
    - Vendor reputation and Certificate of Analysis
    - Reconstitution math and storage
  what_to_track:
    - Glycemic markers
    - Body composition
    - Exercise performance
  reality_check: Almost all evidence is preclinical. Human data exist but are very limited; treat MOTS-c as research-stage, not clinical-grade.

