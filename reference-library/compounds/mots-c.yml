schema_version: 1
compound_id: mots-c
status: approved
updated_at: "2026-06-19"

identity:
  name: MOTS-c
  aliases:
    - Mitochondrial Open Reading Frame of the 12S rRNA-c
    - MOTSc
  non_aliases:
    - Humanin
    - SHLP1
    - SHLP2
  compound_type: peptide
  categories:
    - metabolic
    - longevity

forms:
  primary_route: subq
  supported_routes:
    - subq
  excluded_routes:
    - route: oral
      reason: Peptide; no oral formulation studied in humans.
    - route: intranasal
      reason: No clinical evidence for intranasal MOTS-c.
    - route: topical
      reason: No clinical evidence for topical MOTS-c.
  form_factors:
    - lyophilized-powder-research-vial
  verification_fields:
    - vendor
    - lot_number
    - purity_coa
    - reconstitution_diluent

positioning:
  why_use_this_compound:
    - One of the first mitochondrial-derived peptides identified — encoded inside the mitochondrial genome itself, not the nucleus
    - Preclinical data tie it to AMPK activation, improved insulin sensitivity, and exercise capacity
    - The peptide your body produces more of in response to exercise, which is why endurance-focused users care
  who_is_tracking_this:
    - Longevity self-experimenters running research-grade mitochondrial peptides
    - Endurance athletes chasing exercise-capacity and metabolic-resilience signals
    - Users with metabolic syndrome or prediabetes trying it for insulin sensitivity
  common_user_goals:
    - Better insulin sensitivity and glycemic control
    - More exercise capacity / VO2 max preservation
    - Metabolic resilience as a hedge against age-related decline

evidence:
  tier: preclinical
  mechanism_targets:
    - AMPK (activated via folate / de novo purine pathway)
    - Skeletal muscle glucose handling
    - Mitochondrial stress response
  claim_summary:
    - 16-amino-acid peptide encoded within mitochondrial 12S rRNA; first characterized by Lee et al., Cell Metabolism 2015.
    - In animal models, restores insulin sensitivity, reduces diet-induced obesity, and improves metabolic homeostasis.
    - Circulating MOTS-c rises with exercise in humans, suggesting an endogenous exercise-mimetic role.
    - Human interventional data are very limited; clinical translation is early-stage (CohBar program ended).
  evidence_gaps:
    - Almost no published human interventional trial data
    - Long-term safety unknown
    - No approved indication anywhere; all current use is grey-market research peptide

risks:
  by_route:
    subq:
      - Unregulated supply — purity and identity not verifiable without an independent COA
      - Long-term safety unknown
      - Injection-site reactions possible
      - Theoretical interaction with glucose-lowering medications (additive hypoglycemia)

tracking:
  useful_logs:
    - Fasting glucose and insulin (HOMA-IR)
    - HbA1c
    - Body composition (DEXA or BIA)
    - Exercise performance (VO2 max, time-to-exhaustion, recovery)
    - Injection-site reactions
  inventory_fields:
    - vendor
    - lot_number
    - purity_coa
    - reconstitution_date
  peppi_actions:
    - flag-research-only
    - prompt-coa-upload

app_profile:
  headline: Mitochondrial-encoded exercise-mimetic peptide with strong preclinical metabolic data and very thin human evidence.
  summary: "MOTS-c is a mitochondrial-derived peptide studied in metabolic stress, exercise, and insulin-sensitivity contexts. Useful tracking ties preparation and timing to training, energy, glucose, sleep, recovery, and tolerability rather than vague wellness notes."
  why_people_care:
    - Novel mitochondrial-encoded peptide tied directly to aging biology
    - Exercise-mimetic preclinical signal (insulin sensitivity, VO2 max, fat loss)
    - Mechanistically distinct from AMPK activators like metformin
  what_to_verify:
    - Vendor reputation and an independent third-party Certificate of Analysis
    - Reconstitution math, diluent, and storage
    - Lot consistency between vials
  what_to_track:
    - Glycemic markers (fasting glucose, insulin, HbA1c)
    - Body composition over months, not weeks
    - Exercise performance and recovery
  reality_check: The exciting data are almost entirely in mice. Human interventional evidence is thin enough that anyone using MOTS-c is effectively part of an n=1 experiment.

