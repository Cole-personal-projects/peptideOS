    - "reconstitution volume (mL)"
    - "reconstituted concentration (mg/mL)"
    - "lot number"
    - "expiration date"
    - "storage temperature"
    - "source / vendor"
    - "DAC status (DAC-conjugated CJC-1295 vs non-DAC modified GRF (1-29))"
    - "Blend components if applicable"
  peppi_actions:
    - "flag-dac-ambiguity"
    - "flag-blend-components"
    - "prompt-igf1-lab-cadence"
    - "log-injection-site"

app_profile:
  headline: "Long-acting GHRH analog research peptide; naming confusion between the DAC form and modified GRF (1-29) is the main tracking hazard."
  summary: "CJC-1295 is a synthetic 30-amino-acid analog of growth hormone-releasing hormone (GHRH). In its original Drug Affinity Complex (DAC) form, conjugation to a maleimidopropionic acid linker binds serum albumin and prolongs half-life, producing sustained GH and IGF-1 elevation for roughly a week after a single subcutaneous dose in a small Phase I study. The compound often sold as 'CJC-1295 without DAC' is actually modified GRF (1-29), a shorter-acting and pharmacokinetically distinct GHRH fragment. CJC-1295 has no FDA or EMA approval; modern grey-market supply is the only practical source, and identity, purity, and sterility depend on the vendor."
  why_people_care:
    - "Long-acting GHRH analog that preserves endogenous pulsatile GH release rather than supplying exogenous GH"
    - "Frequently discussed alongside ipamorelin as a 'CJC-1295 / ipamorelin' stack"
    - "Blurred naming makes it hard to tell DAC from non-DAC, and to separate CJC-1295 from sermorelin or tesamorelin"
  what_to_verify:
    - "Exact label text and whether the product is the DAC-conjugated CJC-1295 or the non-DAC modified GRF (1-29) variant"
    - "Whether the vial contains CJC-1295 alone or is blended with another secretagogue (commonly ipamorelin)"
    - "Source, lot, vial amount, reconstitution volume, storage, and expiration"
    - "Certificate of analysis confirming peptide identity and HPLC purity"
  what_to_track:
    - "Sleep, recovery, body composition"
    - "IGF-1 labs at sensible intervals"
    - "Fasting glucose if use is sustained"
    - "Injection-site reactions"
    - "DAC variant and blend status on every log entry"
  reality_check: "The strongest evidence for CJC-1295 is a single small Phase I pharmacokinetic study (Alba 2006) of the DAC form; no Phase III data and no regulatory approval exist. The naming and identity landscape is messy: 'CJC-1295 with DAC' and the commonly sold 'CJC-1295 without DAC' (modified GRF (1-29)) are different molecules with different pharmacokinetics. Treat compound-level claims as tentative and keep exact label capture at the center of any record."

