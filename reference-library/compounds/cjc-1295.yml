    - "Body composition trends"
    - "IGF-1 labs over time (baseline and follow-up)"
    - "Fasting glucose and HbA1c if sustained use is logged"
    - "Injection-site reactions"
    - "Variant and blend note on each log entry (DAC vs non-DAC; CJC-1295 alone vs blended with ipamorelin, etc.)"
  inventory_fields:
