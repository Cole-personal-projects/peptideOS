claims:
  - id: "identity-ghrh-analog"
    text: "CJC-1295 is a synthetic 30-amino-acid analog of human growth hormone-releasing hormone (GHRH), modified to resist enzymatic degradation and, in the DAC form, conjugated to a maleimidopropionic acid linker that binds serum albumin."
    claim_type: identity
    evidence_level: identity
    route_scope:
      - subq
    source_ids:
      - "pubchem-cjc-1295"
      - "alba-2006-jcem"
    confidence: high
    limitations:
      - "Identity verified from the PubChem record and the published Phase I study; sequence and modification details may vary across grey-market preparations."

  - id: "mechanism-ghrhr-albumin-binding"
    text: "CJC-1295 binds the pituitary GHRH receptor (GHRHR) on somatotrophs and stimulates endogenous GH synthesis and release; in the DAC-conjugated form, serum albumin binding prolongs circulating half-life and extends the GH/IGF-1 response window."
    claim_type: mechanism
    evidence_level: human_limited
    route_scope:
      - subq
    source_ids:
      - "alba-2006-jcem"
      - "pubchem-cjc-1295"
    confidence: high
    limitations:
      - "Mechanism for the DAC form is established by the Alba 2006 Phase I study and the conjugate design literature; the non-DAC variant ('modified GRF (1-29)') does not share this pharmacokinetic profile."

  - id: "evidence-single-dose-pharmacokinetics"
    text: "A single subcutaneous dose of DAC-conjugated CJC-1295 produced sustained elevation of GH and IGF-1 over approximately six days in healthy adults and in adults with GHD in a small Phase I study (Alba 2006, JCEM)."
    claim_type: evidence
    evidence_level: human_limited
    route_scope:
      - subq
    source_ids:
      - "alba-2006-jcem"
    confidence: medium
    limitations:
      - "Small Phase I pharmacokinetic study; no Phase III efficacy data and no long-term safety follow-up."

  - id: "regulatory-no-approval"
    text: "CJC-1295 has no FDA or EMA approval for any indication; the original ConjuChem development program did not result in a marketed product, and modern supply is compounded or research-market."
    claim_type: regulatory
    evidence_level: approved_label
    route_scope:
      - subq
    source_ids:
      - "pubchem-cjc-1295"
      - "alba-2006-jcem"
    confidence: medium
    limitations:
      - "Regulatory status here is inferred from absence of approval and from the public development record; no specific FDA correspondence is cited for CJC-1295 by name."

  - id: "regulatory-wada-prohibited"
    text: "CJC-1295 falls under WADA's Section S2 (peptide hormones, growth factors, related substances and mimetics) and is prohibited in- and out-of-competition for athletes subject to the World Anti-Doping Code."
    claim_type: regulatory
    evidence_level: approved_label
    route_scope:
      - subq
    source_ids:
      - "wada-prohibited-list-2026"
    confidence: high
    limitations:
      - "Class-level inclusion under S2; athletes must consult the current year's Prohibited List directly for binding status."

  - id: "formulation-variant-distinction"
    text: "The product commonly sold as 'CJC-1295 without DAC' is modified GRF (1-29), a different molecule from DAC-conjugated CJC-1295 with different pharmacokinetics; treating them as identical in inventory or schedule logs is a known error."
    claim_type: formulation
    evidence_level: theoretical
    route_scope:
      - subq
    source_ids:
      - "pubchem-cjc-1295"
    confidence: medium
    limitations:
      - "Distinction is widely reported in the published review and pharmacology literature but is not the subject of a single primary comparative trial cited here; users should verify from the product label."

  - id: "risk-injection-site-and-sterility"
    text: "Subcutaneous injection of CJC-1295 carries the generic peptide-injection risk of injection-site reactions (redness, pain, swelling), and compounded or research-market supply adds sterility, identity, and endotoxin risk that depends entirely on the source."
    claim_type: risk
    evidence_level: theoretical
    route_scope:
      - subq
    source_ids: []
    confidence: low
    limitations:
      - "Injection-site reaction is a generic injectable-peptide risk not specific to CJC-1295; compounded sterility and identity risk is a supply-chain observation, not a CJC-1295-specific trial readout."

  - id: "risk-sustained-igf1"
    text: "Sustained elevation of GH and IGF-1 from long-acting GHRH agonism carries theoretical risk of insulin resistance, fluid retention, and effects on pre-existing neoplasia; this has not been established by a CJC-1295-specific long-term trial."
    claim_type: risk
