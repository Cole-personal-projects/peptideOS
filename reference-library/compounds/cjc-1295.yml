schema_version: 1
compound_id: "cjc-1295"
status: approved
updated_at: "2026-06-19"

identity:
  name: "CJC-1295"
  aliases:
    - "DAC:GRF"
    - "DAC-GRF(1-29)"
    - "Modified GRF (1-29) [non-DAC variant, commonly sold in research market; distinct molecule from DAC-conjugated CJC-1295]"
  non_aliases:
    - "Sermorelin (GHRH 1-29, no DAC; different pharmacokinetics)"
    - "Tesamorelin (approved GHRH analog, distinct sequence)"
    - "Somatropin / exogenous GH (different mechanism entirely)"
  compound_type: peptide
  categories:
    - growth-hormone
    - hormone-endocrine

forms:
  primary_route: subq
  supported_routes:
    - subq
  excluded_routes:
    - route: oral
      reason: "Peptide of ~30 amino acids; oral bioavailability is not established for systemic GHRH-receptor activation."
    - route: intranasal
      reason: "No durable source in this record establishes an intranasal CJC-1295 product; research and historical clinical work used subcutaneous administration."
    - route: topical
      reason: "No evidence of transdermal absorption to systemic levels for a peptide of this size."
    - route: im
      reason: "No durable source in this record establishes an intramuscular CJC-1295 product; subcutaneous is the only route used in published human pharmacokinetic studies."
  form_factors:
    - "Lyophilized research vial (typically 2 mg or 5 mg), reconstituted with bacteriostatic water before subcutaneous injection"
  verification_fields:
    - "Exact label text: confirm whether the product is the DAC-conjugated CJC-1295 (sometimes labeled CJC-1295 DAC) or the non-DAC modified GRF (1-29) variant, which is a different molecule"
    - "Whether the vial contains CJC-1295 alone or a blend with another secretagogue (e.g. ipamorelin)"
    - "Vial amount, lot number, source/vendor, expiration date"
    - "Certificate of analysis confirming peptide identity and HPLC purity"
    - "Storage instructions and handling history"

positioning:
  why_use_this_compound:
    - "Track a long-acting GHRH analog research peptide and clearly separate it from sermorelin, tesamorelin, and from the non-DAC modified GRF (1-29) variant"
    - "Capture variant identity (DAC vs non-DAC) and blend components before any inventory, schedule, or log entry"
    - "Connect inventory, reconstitution math, and IGF-1 follow-up context to the exact compound used"
  who_is_tracking_this:
    - "Users on compounded research-market peptides from grey-market suppliers"
    - "Users comparing GHRH-class secretagogues across sleep, recovery, and IGF-1 trends"
    - "Biohacking communities discussing 'CJC-1295 / ipamorelin' stacks as a unit"
  common_user_goals:
    - "Track sleep quality, recovery, body composition, and IGF-1 trends over time"
    - "Distinguish DAC-conjugated CJC-1295 from the non-DAC modified GRF (1-29) variant in inventory and logs"
    - "Connect reconstitution math, vial state, and dosing logs to a known compound identity"

evidence:
  tier: human_limited
  mechanism_targets:
    - "GHRH receptor (GHRHR) on anterior pituitary somatotrophs"
    - "Prolonged elevation of endogenous GH and IGF-1 in the published Phase I study of the DAC-conjugated form"
  claim_summary:
    - "CJC-1295 (DAC:GRF) is a 30-amino-acid GHRH analog conjugated to a maleimidopropionic acid linker (Drug Affinity Complex / DAC) that binds serum albumin and prolongs half-life"
    - "A 2006 Phase I single-dose study (Alba et al., J Clin Endocrinol Metab) reported sustained GH and IGF-1 elevation in healthy adults for ~6 days after a single subcutaneous dose of the DAC-conjugated compound"
    - "The non-DAC variant often marketed as 'CJC-1295 without DAC' is actually modified GRF (1-29), a shorter-acting GHRH fragment, and is a different molecule"
    - "No FDA or EMA approval for any indication; the original ConjuChem development program did not reach approval"
  evidence_gaps:
    - "No published Phase III efficacy or long-term safety data for any indication"
    - "Limited public clinical development since the early Phase I work; most modern data is preclinical, vendor-derived, or community anecdote"
    - "Grey-market supply quality (identity, purity, sterility, endotoxin) is not verifiable"
    - "Variant naming (DAC vs non-DAC) is inconsistent across vendors and is frequently conflated with modified GRF (1-29)"

risks:
  by_route:
    subq:
      - "Injection-site reactions (redness, pain, swelling) are the most commonly reported adverse events for subcutaneous peptide injections in general"
      - "Sustained GH/IGF-1 elevation carries theoretical risk of insulin resistance, fluid retention, and worsening of pre-existing neoplasia; not established by CJC-1295-specific long-term trials"
      - "Sterility, identity, purity, endotoxin, and concentration depend entirely on the compounding source for grey-market supply"
      - "Listed in the WADA Prohibited List (Section S2: peptide hormones, growth hormone releasers); prohibited in- and out-of-competition for athletes"

