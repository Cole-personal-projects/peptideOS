claims:
  - id: identity-pentapeptide
    text: Ipamorelin is a synthetic pentapeptide (Aib-His-D-2-Nal-D-Phe-Lys-NH2).
    claim_type: identity
    evidence_level: human_strong
    route_scope: []
    source_ids:
      - raun-1998
    confidence: high
    limitations: []
  - id: mechanism-selective-ghs
    text: Ipamorelin selectively stimulates pituitary GH release via GHSR-1a without significantly raising ACTH, cortisol, or prolactin at therapeutic doses.
    claim_type: mechanism
    evidence_level: preclinical
    route_scope:
      - subq
      - im
    source_ids:
      - raun-1998
      - ishida-2020
    confidence: high
    limitations:
      - Selectivity demonstrated primarily in rat/swine models and small early human studies
  - id: evidence-bone-growth
    text: Ipamorelin induced longitudinal bone growth in rat models.
    claim_type: evidence
    evidence_level: preclinical
    route_scope: []
    source_ids:
      - johansen-1999
    confidence: high
    limitations:
      - Animal data; no human equivalence demonstrated
  - id: regulatory-status
    text: Ipamorelin is not FDA approved for any indication and is on the WADA prohibited list.
    claim_type: regulatory
    evidence_level: approved_label
    route_scope: []
    source_ids:
      - ishida-2020
    confidence: high
    limitations: []
  - id: risk-injection-site
    text: Subcutaneous injection of peptides like ipamorelin can cause injection-site reactions and carries sterility risk if reconstitution is poor.
    claim_type: risk
    evidence_level: theoretical
    route_scope:
      - subq
      - im
    source_ids: []
    confidence: low
    limitations:
      - Generic injection-route risk; not from an ipamorelin-specific trial readout
