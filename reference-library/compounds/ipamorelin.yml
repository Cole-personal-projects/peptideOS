schema_version: 1
compound_id: ipamorelin
status: approved
updated_at: "2026-06-19"

identity:
  name: Ipamorelin
  aliases:
  - NNC 26-0161
  non_aliases:
  - Ibutamoren
  - MK-677
  - GHRP-6
  - GHRP-2
  compound_type: peptide
  categories:
  - growth-hormone

forms:
  primary_route: subq
  supported_routes:
  - subq
  - im
  excluded_routes:
  - route: oral
    reason: Pentapeptide; oral bioavailability not established for systemic GH effect.
  - route: intranasal
    reason: No durable human evidence for intranasal ipamorelin.
  - route: topical
    reason: No evidence of transdermal absorption to systemic levels.
  form_factors:
  - lyophilized-vial
  verification_fields:
  - vendor
  - lot
  - coa
  - hplc-purity
  - mass-spec
  - bacteriostatic-water-source

positioning:
  why_use_this_compound:
  - Cleanest GH pulse of any peptide secretagogue — no cortisol bump, no prolactin spike, no hunger crash
  - Preserves natural pulsatile GH release rather than blunting the axis
  - Short half-life makes pre-bed pulse dosing simple and predictable
  who_is_tracking_this:
  - Users running GH peptide stacks (usually paired with CJC-1295)
  - Lifters and longevity users who want IGF-1 leverage without the appetite and water retention of MK-677 or GHRP-6
  - Anyone who tried older GHRPs and disliked the prolactin/cortisol side profile
  common_user_goals:
  - Augment endogenous GH pulses (especially overnight)
  - Recovery, sleep quality, and body composition support
  - Avoid the side profile of higher-affinity GHRPs

evidence:
  tier: preclinical
  mechanism_targets:
  - GHSR-1a (ghrelin receptor) selective agonism
  - Pituitary GH release without ACTH/prolactin elevation at therapeutic doses
  claim_summary:
  - Pentapeptide Aib-His-D-2-Nal-D-Phe-Lys-NH2 (Raun 1998)
  - Selective GH release in rat and swine models without cortisol or prolactin increase
  - Induces longitudinal bone growth in rats (Johansen 1999)
  evidence_gaps:
  - Selectivity claims rest on a small set of late-1990s studies and animal work
  - No modern large-scale human efficacy or long-term safety trials
  - No FDA-approved indication; supply is compounded or grey market

risks:
  by_route:
    subq:
    - Injection site reaction (erythema, bruising)
    - Headache, transient flushing reported in early trials
    - Theoretical risk of GH/IGF-1 elevation effects (water retention, insulin resistance) if sustained
    - Banned by WADA for athletes
    - Sterility risk from improper reconstitution
    im:
    - Same as subq plus deeper tissue injection risks (hematoma, nerve proximity)

tracking:
  useful_logs:
  - IGF-1 baseline and follow-up
  - Fasting glucose
  - Injection site condition
  - Subjective sleep and recovery notes
  inventory_fields:
  - vendor
  - lot
  - coa-on-file
  - purity-percent
  - reconstitution-date
  - bac-water-lot
  peppi_actions:
  - log-injection
  - log-site-rotation
  - log-igf1-lab
  - log-glucose-lab

app_profile:
  headline: The clean GHRP — pulses growth hormone without the cortisol or prolactin spike.
  summary: "Ipamorelin is a selective growth-hormone secretagogue often logged around sleep, recovery, fasting windows, and body-composition goals. Useful tracking captures injection timing, stack pairing, hunger, water retention, IGF-1, glucose, and subjective recovery."
  why_people_care:
  - Cleaner endocrine side profile than GHRP-2/GHRP-6
  - Selective growth-hormone secretagogue peptide often used in GH-axis protocols because it is relatively targeted compared with older GHRPs. Good tracking captures injection timing, pairing with CJC or other GHRH analogs, sleep, recovery, hunger, water retention, and IGF-1 labs.
  - Short half-life pairs well with a bedtime injection schedule
  what_to_verify:
  - COA confirming ipamorelin sequence (not a cheaper substituted GHRP)
  - HPLC purity above 98%
  - Bac water source and sterile reconstitution
  what_to_track:
  - IGF-1 before and 6-8 weeks in
  - Fasting glucose
  - Injection site health and rotation
  - Subjective sleep depth and recovery
  reality_check: The selectivity story is well-established but rests largely on small studies from the late 1990s and animal work. There is no large modern human safety dataset, no FDA-approved indication, and effect sizes on body composition in real-world use are modest.

