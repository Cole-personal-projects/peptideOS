schema_version: 1
compound_id: selank
status: approved
updated_at: "2026-06-19"

identity:
  name: Selank
  aliases:
  - TP-7
  - Thr-Lys-Pro-Arg-Pro-Gly-Pro
  - Tuftsin analog
  non_aliases:
  - Semax
  compound_type: peptide
  categories:
  - cognitive

forms:
  primary_route: intranasal
  supported_routes:
  - intranasal
  - subq
  excluded_routes:
  - route: oral
    reason: "Peptide is subject to gastrointestinal proteolysis; intranasal is the established clinical route."
  - route: im
    reason: "No published intramuscular protocol; clinical use is intranasal."
  - route: topical
    reason: "Not relevant to indication."
  form_factors:
  - nasal-spray
  - lyophilized-powder
  verification_fields:
  - sequence
  - purity
  - mass-spec-confirmation
  - concentration

positioning:
  why_use_this_compound:
  - "Russian-approved anxiolytic heptapeptide used clinically for generalized anxiety disorder and neurasthenia."
  - "Reported anxiolysis without sedation, withdrawal, or tolerance in Russian clinical literature."
  - "Hypothesized to act via GABA-A modulation, BDNF upregulation, and enkephalin-system effects rather than direct GABA agonism."
  who_is_tracking_this:
  - users looking for a non-benzodiazepine anxiolytic
  - high-performers wanting an 'edge off' tool that doesn't fog cognition
  - users with situational anxiety who want intranasal acute dosing
  common_user_goals:
  - reduction in subjective anxiety and rumination
  - cognitive clarity under stress
  - non-sedating, non-habit-forming anxiety control

evidence:
  tier: human_limited
  mechanism_targets:
  - GABA-A receptor system modulation
  - serotonin, BDNF, and enkephalin system modulation
  - tuftsin-derived immunomodulatory activity
  claim_summary:
  - "Synthetic heptapeptide Thr-Lys-Pro-Arg-Pro-Gly-Pro derived from the immunomodulator tuftsin with a C-terminal Pro-Gly-Pro stabilizer."
  - "Developed at the Institute of Molecular Genetics of the Russian Academy of Sciences; approved in Russia as a prescription anxiolytic; not FDA-approved."
  - "Small Russian clinical studies in generalized anxiety disorder report efficacy comparable to medazepam with an added antiasthenic effect."
  evidence_gaps:
  - Clinical evidence is predominantly Russian, small-sample, and not Western-replicated.
  - No large Phase III RCTs indexed on ClinicalTrials.gov.
  - Long-term safety and tolerability data is limited.

risks:
  by_route:
    intranasal:
    - "Nasal mucosa irritation possible; not systematically characterized in Western literature."
    - "Published clinical safety data is limited to small Russian trials."
    subq:
    - "No standardized clinical subcutaneous protocol in indexed literature; safety profile via this route is uncharacterized."

tracking:
  useful_logs:
  - subjective anxiety rating (e.g., 0-10)
  - sleep quality
  - cognitive clarity and focus
  - any nasal irritation
  inventory_fields:
  - vial-mg
  - concentration
  - reconstitution-volume
  - lot-number
  - supplier
  peppi_actions:
  - log-anxiety-rating
  - log-sleep
  - log-administration

app_profile:
  headline: "Russian-developed intranasal heptapeptide anxiolytic with a 'calm but clear' profile, derived from tuftsin."
  summary: "Selank is a synthetic anxiolytic peptide related to tuftsin and commonly tracked for stress, focus, mood, and nasal or injectable use. Useful tracking captures route, timing, calming effect, cognition, sleep, and stack context."
  why_people_care:
  - non-benzo anxiolytic with no reported withdrawal or tolerance
  - Synthetic anxiolytic peptide related to tuftsin and commonly tracked for stress, focus, mood, and nasal versus injectable use. Useful records capture route, timing, acute calming or cognitive effects, sleep changes, and whether it is paired with stimulants, anxiolytics, or nootropics.
  - acute, situational dosing via nasal spray
  what_to_verify:
  - sequence and concentration per mL on the COA
  - sterile nasal-spray formulation (preservative, pH, isotonicity)
  - lot and supplier given the Russian / gray-market supply chain
  what_to_track:
  - anxiety rating before and after dosing
  - sleep quality on dosing vs. non-dosing days
  - nasal tolerability and any irritation
  reality_check: "Clinical evidence is small-sample, Russian, and decades old. It is not FDA-approved and the 'no tolerance, no withdrawal' claims are not established to Western regulatory standards."

