    year: 2023
  - id: ncbi-mtii-feeding-2015
    title: Inhibitory Effect of the Melanocortin Receptor Agonist Melanotan-II (MTII) on Feeding
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4689860/
    source_type: publication
    publisher: NCBI PMC
    year: 2015

claims:
  - id: mt2-non-selective-agonist
    text: Melanotan II is a non-selective agonist at MC1R, MC3R, MC4R, and MC5R.
    claim_type: mechanism
    evidence_level: preclinical
    route_scope:
      - subq
    source_ids:
      - ncbi-mtii-feeding-2015
    confidence: high
    limitations: []
  - id: mt2-no-regulatory-approval
    text: Melanotan II has no regulatory approval; the TGA has publicly urged consumers to avoid it.
    claim_type: regulatory
    evidence_level: approved_label
    route_scope:
      - subq
    source_ids:
      - unsw-tga-2023
    confidence: high
    limitations: []
  - id: mt2-case-report-risks
    text: Case reports associate Melanotan II use with melanoma, ischemic priapism, rhabdomyolysis, renal infarction, and PRES.
    claim_type: risk
    evidence_level: human_limited
    route_scope:
      - subq
    source_ids:
      - unsw-tga-2023
    confidence: medium
    limitations:
      - Evidence is case-report level, not controlled trial data.
