schema_version: 1
compound_id: melanotan-ii
status: approved
updated_at: "2026-06-19"

identity:
  name: Melanotan II
  aliases:
    - MT-II
    - MT2
    - Melanotan-2
  non_aliases:
    - Melanotan I
    - Afamelanotide
    - Bremelanotide
  compound_type: peptide
  categories:
    - skin-hair
    - sexual-reproductive
    - hormone-endocrine

forms:
  primary_route: subq
  supported_routes:
    - subq
  excluded_routes:
    - route: oral
      reason: Peptide degraded by gastric proteases; no oral formulation studied.
    - route: topical
      reason: No evidence topical application produces systemic melanocortin activation.
  form_factors:
    - lyophilized-powder-research-vial
  verification_fields:
    - vendor
    - lot_number
    - reconstitution_diluent
    - reconstituted_concentration

positioning:
  why_use_this_compound:
    - Non-selective melanocortin receptor agonist (MC1R, MC3R, MC4R, MC5R) that drives melanogenesis without UV exposure
    - One of the few peptides users self-administer for a visible cosmetic effect (skin pigmentation) alongside reported libido/erection effects
  who_is_tracking_this:
    - Self-experimenters using grey-market research peptides for tanning
    - Users chasing the sexual side effects (the same mechanism that led to Bremelanotide/Vyleesi)
    - People logging mole/skin changes during and after cycles
  common_user_goals:
    - Faster, deeper tan with less sun exposure
    - Increased libido and erectile response
    - Appetite suppression (secondary MC4R effect)

evidence:
  tier: preclinical
  mechanism_targets:
    - MC1R
    - MC3R
    - MC4R
    - MC5R
  claim_summary:
    - Non-selective agonism of melanocortin receptors drives pigmentation, appetite, and sexual-arousal effects.
    - Predecessor to Bremelanotide (Vyleesi), which was developed by isolating the MC4R-driven sexual effect.
    - No regulatory approval anywhere; flagged by FDA and TGA as an unapproved product.
  evidence_gaps:
    - No completed Phase III human trials in any indication
    - Long-term safety unknown; nearly all human safety data comes from adverse-event case reports
    - Grey-market supply means purity, identity, and dose accuracy cannot be assumed

risks:
  by_route:
    subq:
      - Case reports link use to melanoma and changing/atypical moles
      - Reports of ischemic priapism
      - Reports of rhabdomyolysis and renal infarction
      - Reports of posterior reversible encephalopathy syndrome (PRES)
      - Common acute effects include nausea, vomiting, facial flushing, prolonged erection, yawning
      - Unregulated supply chain creates contamination and dosing-accuracy risk

tracking:
  useful_logs:
    - Skin changes (new moles, mole changes, pigmentation map)
    - Acute side effects after injection (nausea, flushing, erection duration)
    - Blood pressure
  inventory_fields:
    - vendor
    - lot_number
    - reconstitution_date
    - reconstituted_concentration
  peppi_actions:
    - flag-regulatory-warning
    - prompt-skin-check-log

app_profile:
  headline: Grey-market melanocortin agonist used for tanning and libido — no regulator has approved it.
  summary: "Melanotan II is a melanocortin peptide known for tanning-related use and libido effects. Practical tracking captures dose timing, UV exposure, skin response, nausea, flushing, appetite changes, pigmentation changes, and cumulative use."
  why_people_care:
    - Visible, fast cosmetic tan without UV
    - Strong reported libido and erection effects
    - Appetite suppression as a secondary effect
  what_to_verify:
    - Vendor reputation and lot number on the vial
    - Reconstitution math and storage (bacteriostatic water, refrigerated)
    - Baseline mole map and any pre-existing atypical nevi before first dose
  what_to_track:
    - Mole and skin changes over time (photo baseline)
    - Acute side-effect log per injection (nausea, flushing, erection duration)
    - Blood pressure
  reality_check: Most of the human evidence is adverse-event case reports, not trials. The TGA has explicitly told consumers to avoid it, and dermatologists have flagged atypical mole changes in users.

