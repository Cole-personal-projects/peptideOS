app_profile:
  headline: A triple-agonist metabolic peptide people are watching because it may push past the current GLP-1/GIP ceiling.
  summary: >-
    Retatrutide is an investigational GLP-1, GIP, and glucagon receptor agonist.
    PeptideOS tracks it through user-confirmed inventory, reconstitution math,
    schedule previews, tolerability notes, and trend data while keeping trial
    evidence separate from research-market product assumptions.
  why_people_care:
    - It hits GLP-1, GIP, and glucagon receptors instead of only one or two incretin pathways.
    - Published clinical data and phase 3 trials make it a high-interest GLP-1 category compound.
    - It creates practical tracking needs around appetite, weight, HR, HRV, sleep, GI tolerability, inventory, and titration context.
  what_to_verify:
    - Verify vial identity, amount, lot, source, COA, route, and storage from the physical product.
    - Confirm concentration from vial amount and BAC water volume before calculating injection volume.
    - Review whether any other incretin, appetite-suppressing, glucose-modulating, or stimulant compound is active in the user's stack.
  what_to_track:
    - Weight trend, appetite, GI tolerability, resting heart rate, HRV, sleep, missed entries, and inventory depletion.
    - Reconstitution date, concentration, active vial state, and remaining inventory.
    - Any user-entered schedule or titration changes over time.
  reality_check: The clinical Retatrutide story is not a gray-market vial. PeptideOS should help the user track what they actually have, what they actually did, and what is still uncertain.

