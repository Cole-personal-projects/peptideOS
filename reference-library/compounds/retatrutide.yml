positioning:
  why_use_this_compound:
    - Track Retatrutide as a triple incretin agonist research compound, separate from semaglutide and tirzepatide.
    - Keep user-entered vial, schedule, tolerability, appetite, weight, HR, HRV, and sleep context tied to the exact item.
    - Separate clinical-trial evidence from unsupported research-market product assumptions.
  who_is_tracking_this:
    - Users comparing GLP-1, GIP, and glucagon agonist research logs.
    - Users who want a structured GLP-1 workflow with explicit evidence and product-quality limits.
    - Users who want Peppi to build a schedule preview from confirmed template or label details.
  common_user_goals:
    - Track appetite, weight trend, gastrointestinal tolerability, resting heart rate, HRV, and sleep context.
    - Connect active inventory, reconstitution math, and schedule logs.
    - Review overlap with other incretin or appetite-suppressing compounds before saving a stack.

mechanism:
  plain_english: Triple GLP-1, GIP, and glucagon receptor agonist.
  targets:
    - GLP-1 receptor
    - GIP receptor
    - glucagon receptor

evidence:
  tier: phase_3_topline
  mechanism_targets:
    - GLP-1 receptor
    - GIP receptor
    - glucagon receptor
  claim_summary:
    - Published phase 2 obesity data reported dose-related body-weight reductions.
    - ClinicalTrials.gov lists phase 3 obesity research involving Retatrutide.
    - This PeptideOS record treats Retatrutide as investigational, not as an approved product label.
  evidence_gaps:
    - No FDA-approved US prescribing label or consumer storage instructions.
    - Some phase 3 results are company-announced/topline or not yet reflected in an FDA-approved label.
    - Retatrutide is investigational and not FDA approved.
    - Published clinical-trial data do not validate identity, sterility, concentration, stability, or safety of research-market vials.
    - Long-term outcomes and user-sourced product quality remain uncertain outside controlled trials.
  clinical_evidence:
    - design: phase-2-randomized-controlled-trial
      population: Adults with obesity in published clinical trial literature.
      finding: Published phase 2 data reported dose-related body-weight reductions with Retatrutide.
      citation_ids:
        - pubmed-retatrutide-obesity-phase-2
      source_quality: source-backed
      limitations: Trial setting does not validate user-sourced product identity, concentration, sterility, or storage.
    - design: phase-3-program
      population: obesity and weight-management clinical trial populations listed in trial registry context.
      finding: Trial registry context describes active later-stage Retatrutide investigation.
      citation_ids:
        - clinicaltrials-retatrutide-triumph-5
      source_quality: trial-registry
      limitations: Registry entries are not approved-product labels, include topline program context, and do not establish personal-use instructions.
  regulatory_status:
    status: investigational
    region: US
    summary: Lilly describes Retatrutide as not FDA approved and investigational while phase 3 trials evaluate safety and efficacy.
    citation_ids:
      - clinicaltrials-retatrutide-triumph-5
    source_quality: trial-registry
    limitations: Trial registry context does not validate legality, sourcing, or product quality of user-entered material.

risks:
  by_route:
    subq:
      known_contraindications: []
      caution_populations: []
      negative_stack_flags:
        - Review overlap with other incretin, appetite-suppressing, glucose-modulating, or stimulant compounds before saving a stack.
        - Track resting heart rate, HRV, sleep, appetite suppression, and gastrointestinal tolerability as separate signals.
      formulation_risks:
        - Research-market vials can introduce identity, purity, sterility, endotoxin, storage, and concentration uncertainty.
        - Reconstitution math depends on user-confirmed vial amount and diluent volume, not on the compound name alone.
      unknowns:
        - Long-term safety for non-trial research-market products is not established.
        - Product-specific stability and storage require label or supplier documentation.

storage:
  handling:
    - Verify storage from the exact vial label or supplier documentation.
    - Do not infer approved-product storage instructions for research-market vials.
    - Keep reconstitution date, diluent volume, concentration, active vial state, and discard notes with the inventory item.

