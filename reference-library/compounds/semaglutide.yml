positioning:
  why_use_this_compound:
    - "Best-validated GLP-1 receptor agonist of the decade, with strong weight loss and cardiometabolic data."
    - "FDA-approved as Ozempic (T2D, weekly subq), Wegovy (chronic weight management), and Rybelsus (oral T2D)."
    - "SELECT trial (2023) showed cardiovascular benefit in overweight/obese patients with established CVD, independent of diabetes."
  who_is_tracking_this:
    - users on prescribed Ozempic, Wegovy, or Rybelsus for T2D or weight management
    - users running compounded semaglutide from a telehealth or research-grade source
    - users tracking weight loss, appetite suppression, and side-effect tolerability week by week
  common_user_goals:
    - sustained weight loss without crash dieting
    - appetite and 'food noise' reduction
    - improved glycemic control or HbA1c
    - cardiometabolic risk reduction

evidence:
  tier: approved_label
  mechanism_targets:
    - GLP-1 receptor agonism
    - delayed gastric emptying
    - central appetite suppression
    - glucose-dependent insulin secretion
  claim_summary:
    - "FDA-approved GLP-1 receptor agonist developed by Novo Nordisk; first approved 2017 as Ozempic for T2D."
    - "Wegovy (higher-dose subq) approved 2021 for chronic weight management; Rybelsus (oral) approved 2019 for T2D."
    - "SELECT trial (2023) demonstrated a 20% reduction in MACE in overweight/obese adults with established CVD and without diabetes."
    - "GI side effects (nausea, constipation, diarrhea) are common, especially during dose escalation."
    - "Labeled warnings for pancreatitis, gallbladder disease, and a boxed warning for thyroid C-cell tumors based on rodent data."
  evidence_gaps:
    - Long-term effects beyond ~5 years of continuous use are still being characterized.
    - Effects of compounded or relabeled semaglutide from non-pharmacy sources may differ from the approved products in purity, potency, and stability.
    - Optimal protocol for weight maintenance after discontinuation is not established (rebound is common).

risks:
  by_route:
    subq:
      - "GI side effects (nausea, vomiting, constipation, diarrhea) are common, especially during titration."
      - "Labeled warnings: acute pancreatitis, gallbladder disease (cholelithiasis, cholecystitis), acute kidney injury from volume depletion, diabetic retinopathy complications in T2D."
      - "Boxed warning for thyroid C-cell tumors (based on rodent data); contraindicated with personal/family history of medullary thyroid carcinoma or MEN 2."
      - "Compounded versions from non-pharmacy sources may have inconsistent potency, purity, or sterility."
    oral:
      - "Same systemic warnings as subq (pancreatitis, gallbladder, thyroid C-cell, retinopathy)."
      - "Must be taken on an empty stomach with minimal water and a 30-minute fast for absorption; missing this dramatically reduces bioavailability."
      - "GI side effects are common and can be more prominent at initiation than with weekly subq."

tracking:
  useful_logs:
    - weight trend (weekly average)
    - waist circumference
    - appetite and 'food noise' rating
    - nausea and GI tolerability
    - injection-site reactions (subq) or dosing-fast adherence (oral)
    - HbA1c and fasting glucose if diabetic
  inventory_fields:
    - exact-product-name
    - route
    - strength
    - container-type
    - lot-number
    - expiration-date
    - source
  peppi_actions:
    - log-weekly-dose
    - log-weight
    - log-appetite-rating
    - log-side-effects

pharmacokinetics:
  half_life_hours: 168
  half_life_source: "DailyMed semaglutide labeling describes an elimination half-life of approximately 1 week."
  source_ids:
  - dailymed-semaglutide
  evidence_tier: approved_label
  model_notes: "First-order estimated remaining amount only; does not represent measured concentration, clinical response, or dose guidance."

app_profile:
  headline: "FDA-approved weekly GLP-1 agonist (Ozempic / Wegovy / Rybelsus) with the strongest weight-loss and cardiometabolic evidence in the class."
  summary: "Semaglutide is a long-acting GLP-1 receptor agonist used for glucose control and weight management. Useful tracking focuses on weekly dose step, injection day, appetite, weight trend, GI effects, glucose data, and missed-dose history."
  why_people_care:
    - the most clinically validated GLP-1 of the decade, with weight loss and CV benefit
    - dramatic appetite and 'food noise' reduction reported by most users
    - weekly subq pen makes adherence easy compared to daily medications
    - oral option (Rybelsus) exists for needle-averse users
  what_to_verify:
    - exact product (Ozempic vs Wegovy vs Rybelsus vs compounded) and strength per mL or mg per tablet
    - lot, expiration, and source (pharmacy vs telehealth-compounded vs research)
    - container type (pen, vial, tablet blister) and storage history (refrigerated vs room temp)
  what_to_track:
    - weekly weight trend rather than daily fluctuations
    - appetite and 'food noise' rating before and after each dose
    - nausea, constipation, and other GI tolerability over the titration weeks
    - injection-site reactions or, for Rybelsus, adherence to the fasting-with-water protocol
  reality_check: "Tolerability during titration is the main barrier, not efficacy. Weight regain after stopping is common, and compounded sources are not equivalent to the FDA-approved pens — purity, potency, and sterility can vary."

