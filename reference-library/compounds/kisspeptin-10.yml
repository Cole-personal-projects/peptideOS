claims:
  - id: identity-decapeptide
    text: Kisspeptin-10 is the C-terminal decapeptide fragment of kisspeptin, the endogenous ligand of KISS1R.
    claim_type: identity
    evidence_level: human_strong
    route_scope: []
    source_ids:
      - skorupskaite-2015
    confidence: high
    limitations: []
  - id: mechanism-kiss1r
    text: Kisspeptin activates KISS1R on hypothalamic GnRH neurons, driving GnRH pulses and downstream LH/FSH release.
    claim_type: mechanism
    evidence_level: human_strong
    route_scope:
      - subq
      - im
    source_ids:
      - skorupskaite-2015
      - abbara-2020
    confidence: high
    limitations: []
  - id: evidence-kp10-lh
    text: Kisspeptin-10 administration acutely raises LH (and FSH) in humans across pubertal transition.
    claim_type: evidence
    evidence_level: human_limited
    route_scope:
      - subq
      - im
    source_ids:
      - chan-2018
      - comninos-2025
    confidence: high
    limitations:
      - Trial dosing protocols not transferable to off-label personal use
  - id: evidence-ivf-kp54
    text: Kisspeptin (predominantly kisspeptin-54) has been used to trigger oocyte maturation in IVF with reduced OHSS risk vs hCG.
    claim_type: evidence
    evidence_level: human_limited
    route_scope:
      - subq
    source_ids:
      - abbara-2020
      - ivf-kp54-trial
    confidence: high
    limitations:
      - Most IVF trial data uses kisspeptin-54, not kisspeptin-10
  - id: regulatory-status
    text: Kisspeptin-10 is not FDA approved; clinical use is investigational.
    claim_type: regulatory
    evidence_level: approved_label
    route_scope: []
    source_ids:
      - skorupskaite-2015
    confidence: high
    limitations: []
  - id: risk-injection-generic
    text: Subcutaneous peptide injection carries injection-site reaction risk and sterility risk if reconstitution is poor.
    claim_type: risk
    evidence_level: theoretical
    route_scope:
      - subq
      - im
    source_ids: []
    confidence: low
    limitations:
      - Generic injection-route risk; not from a kisspeptin-10 specific trial readout
