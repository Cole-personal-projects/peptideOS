schema_version: 1
compound_id: kisspeptin-10
status: approved
updated_at: "2026-06-19"

identity:
  name: Kisspeptin-10
  aliases:
    - KP-10
    - Metastin 45-54
  non_aliases:
    - Kisspeptin-54
    - GnRH
  compound_type: peptide
  categories:
    - hormone-endocrine
    - sexual-reproductive

forms:
  primary_route: subq
  supported_routes:
    - subq
    - im
  excluded_routes:
    - route: oral
      reason: Decapeptide; rapidly degraded in GI tract, oral systemic delivery not established.
    - route: intranasal
      reason: No durable human evidence for intranasal kisspeptin-10.
    - route: topical
      reason: No evidence of transdermal systemic absorption.
  form_factors:
    - lyophilized-vial
  verification_fields:
    - vendor
    - lot
    - coa
    - hplc-purity
    - mass-spec

positioning:
  why_use_this_compound:
    - Upstream activator of GnRH via KISS1R, driving LH/FSH and downstream sex steroids
    - Investigated for reproductive disorders, IVF triggering, and sexual response
    - Stimulates physiologic LH pulse pattern rather than synthetic GnRH agonist sustained signaling
  who_is_tracking_this:
    - Researchers studying HPG axis modulation
    - Users tracking endogenous LH/testosterone or LH/estradiol responses
  common_user_goals:
    - HPG axis activation
    - Endogenous LH/FSH stimulation

evidence:
  tier: human_limited
  mechanism_targets:
    - KISS1R (GPR54) on hypothalamic GnRH neurons
    - Downstream LH and FSH release from pituitary
  claim_summary:
    - Kisspeptin signaling is required for normal puberty and HPG axis function (loss-of-function = hypogonadotropic hypogonadism)
    - Kisspeptin-10 administration acutely raises LH and FSH in humans
    - Kisspeptin-54 has been used to trigger oocyte maturation in IVF with reduced OHSS risk vs hCG
  evidence_gaps:
    - Most published IVF/clinical trial work uses kisspeptin-54, not kisspeptin-10
    - No FDA approval
    - Long-term safety and chronic-use data minimal

risks:
  by_route:
    subq:
      - Transient hormonal swings (LH/FSH, then sex steroid changes)
      - Headache and injection-site reaction reported
      - Theoretical desensitization with overly frequent dosing
      - Sterility risk from improper reconstitution
    im:
      - Same as subq plus deeper tissue injection risks

tracking:
  useful_logs:
    - LH and FSH (timed)
    - Total testosterone or estradiol depending on user
    - Injection site condition
    - Menstrual cycle markers (when applicable)
  inventory_fields:
    - vendor
    - lot
    - coa-on-file
    - purity-percent
    - reconstitution-date
  peppi_actions:
    - log-injection
    - log-lh-lab
    - log-fsh-lab
    - log-testosterone-lab
    - log-estradiol-lab

app_profile:
  headline: Upstream HPG-axis activator that drives endogenous LH and FSH.
  summary: "Kisspeptin-10 is a short peptide that stimulates GnRH signaling upstream of LH and FSH release. Useful tracking connects route and timing with reproductive-hormone labs, libido, mood, fertility context, and concurrent HPTA or TRT protocols."
  why_people_care:
    - Endogenous, pulsatile path to LH/FSH instead of exogenous gonadotropins
    - Investigational interest for reproductive disorders, IVF triggering, and psychosexual response
    - Possible PCT-style use is discussed online but not validated in trials
  what_to_verify:
    - COA confirms kisspeptin-10 sequence (vs kisspeptin-54 or unrelated kisspeptins)
    - HPLC purity
    - Sterile reconstitution practice
  what_to_track:
    - LH, FSH
    - Sex steroid response
    - Subjective effects
  reality_check: Human evidence base is real but concentrated at a single research group, and most clinical-grade trials use kisspeptin-54, not kisspeptin-10. No FDA approval. Self-experimentation is well outside the trial context.

