<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0a0a0f">
    <title>PeptideOS Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0a0a0f;
        color: #f8fafc;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 460px);
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 16px;
        padding: 24px;
        background: #11131a;
      }

      h1 {
        margin: 0;
        font-size: 1.4rem;
        line-height: 1.2;
      }

      p {
        margin: 12px 0 0;
        color: #a7b0c0;
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        margin-top: 20px;
        color: #7dd3fc;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PeptideOS is offline</h1>
      <p>Your saved PeptideOS data is stored locally on this device. Reconnect to load routes that have not been cached yet.</p>
      <a href="/">Return to PeptideOS</a>
    </main>
  </body>
</html>
